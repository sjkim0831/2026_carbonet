services:
  carbonet-proxy:
    image: nginx:1.27-alpine
    container_name: carbonet-proxy
    restart: unless-stopped
    depends_on:
      - carbonet-blue
      - carbonet-green
    ports:
      - "80:80"
    volumes:
      - ./ops/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  carbonet-blue:
    build:
      context: .
      dockerfile: Dockerfile
    image: carbonet-app:latest
    container_name: carbonet-blue
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SERVER_PORT: 18000
      SPRING_DATASOURCE_URL: jdbc:cubrid:host.docker.internal:33000:carbonet:::?charset=UTF-8
      SPRING_DATASOURCE_USERNAME: dba
      SPRING_DATASOURCE_PASSWORD: ""
      APP_COLOR: blue
    expose:
      - "18000"
    volumes:
      - ./var/logs/blue:/app/var/logs
      - ./var/run/blue:/app/var/run
      - ./var/file:/app/var/file

  carbonet-green:
    image: carbonet-app:latest
    container_name: carbonet-green
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SERVER_PORT: 18000
      SPRING_DATASOURCE_URL: jdbc:cubrid:host.docker.internal:33000:carbonet:::?charset=UTF-8
      SPRING_DATASOURCE_USERNAME: dba
      SPRING_DATASOURCE_PASSWORD: ""
      APP_COLOR: green
    expose:
      - "18000"
    volumes:
      - ./var/logs/green:/app/var/logs
      - ./var/run/green:/app/var/run
      - ./var/file:/app/var/file
