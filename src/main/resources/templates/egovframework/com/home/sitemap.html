<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta th:if="${_csrf != null}" name="_csrf" th:content="${_csrf.token}" />
    <meta th:if="${_csrf != null}" name="_csrf_header" th:content="${_csrf.headerName}" />
    <title>사이트맵 | CCUS 탄소발자국 플랫폼</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&amp;family=Public+Sans:wght@400;600;700&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <style type="text/tailwindcss">
        :root {
            --kr-gov-blue: #00378b;
            --kr-gov-blue-hover: #002d72;
            --kr-gov-text-primary: #1a1a1a;
            --kr-gov-text-secondary: #4d4d4d;
            --kr-gov-border-light: #d9d9d9;
            --kr-gov-focus: #005fde;
            --kr-gov-bg-gray: #f2f2f2;
            --kr-gov-radius: 5px;
        }
        @layer base {
            body { font-family: 'Noto Sans KR', 'Public Sans', sans-serif; -webkit-font-smoothing: antialiased; }
            .skip-link {
                @apply absolute -top-full left-0 bg-[var(--kr-gov-blue)] text-white p-3 z-[100] transition-all focus:top-0 focus:outline-none focus:ring-2 focus:ring-white;
            }
        }
        .material-symbols-outlined { font-size: 24px; line-height: 1.4; }
        .sitemap-domain-card { @apply rounded-[var(--kr-gov-radius)] border border-[var(--kr-gov-border-light)] bg-white shadow-sm; }
        .sitemap-link { @apply inline-flex items-center gap-2 rounded-[var(--kr-gov-radius)] px-3 py-2 text-sm font-medium text-[var(--kr-gov-text-primary)] hover:bg-[var(--kr-gov-bg-gray)] hover:text-[var(--kr-gov-blue)] transition-colors; }
    </style>
</head>
<body class="bg-[var(--kr-gov-bg-gray)] text-[var(--kr-gov-text-primary)]">
<a class="skip-link" href="#main-content">본문 바로가기</a>
<div th:replace="~{egovframework/com/common/fragments/header :: header}"></div>
<main id="main-content" class="max-w-7xl mx-auto px-4 lg:px-8 py-12">
    <section class="rounded-2xl bg-gradient-to-r from-[var(--kr-gov-blue)] to-[#0b5fb8] text-white px-8 py-10 shadow-lg">
        <p class="text-sm font-bold tracking-[0.2em] uppercase opacity-80">Site Navigation</p>
        <h2 class="text-4xl font-black mt-3">사이트맵</h2>
        <p class="text-base text-blue-50 mt-4 max-w-3xl leading-relaxed">
            홈 메뉴 관리 기준으로 자동 구성되는 전체 사용자 메뉴 구조입니다. 메뉴 관리에서 순서나 노출 상태가 바뀌면 이 화면도 같은 트리 기준으로 즉시 반영됩니다.
        </p>
    </section>

    <section class="mt-8 rounded-[var(--kr-gov-radius)] border border-blue-100 bg-blue-50 px-5 py-4 text-sm text-[var(--kr-gov-text-secondary)]">
        현재 사이트맵은 `HMENU1` 메뉴 트리와 메뉴 정렬 정보를 기준으로 렌더링됩니다.
    </section>

    <section class="mt-10 grid grid-cols-1 xl:grid-cols-2 gap-6">
        <article class="sitemap-domain-card" th:each="top : ${siteMapSections}">
            <div class="border-b border-[var(--kr-gov-border-light)] px-6 py-5">
                <a class="inline-flex items-center gap-2 text-2xl font-black text-[var(--kr-gov-blue)] hover:underline"
                   th:href="${top.url}" th:text="${top.label}">메뉴</a>
                <p class="text-sm text-[var(--kr-gov-text-secondary)] mt-2" th:text="${top.code}">H000</p>
            </div>
            <div class="p-6 space-y-5">
                <section th:each="section : ${top.children}">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="material-symbols-outlined text-[var(--kr-gov-blue)]" th:text="${#strings.isEmpty(section.icon) ? 'folder_open' : section.icon}">folder_open</span>
                        <h3 class="text-lg font-bold" th:text="${section.label}">섹션</h3>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                        <a class="sitemap-link" th:each="item : ${section.children}" th:href="${item.url}">
                            <span class="material-symbols-outlined text-[20px] text-[var(--kr-gov-blue)]"
                                  th:text="${#strings.isEmpty(item.icon) ? 'chevron_right' : item.icon}">chevron_right</span>
                            <span th:text="${item.label}">항목</span>
                        </a>
                    </div>
                </section>
            </div>
        </article>
    </section>
</main>
<div th:replace="~{egovframework/com/common/fragments/footer :: footer}"></div>
</body>
</html>
