<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title th:text="${placeholderTitleEn} + ' | CCUS Footprint Platform'">Menu Screen | CCUS Footprint Platform</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Public+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style type="text/tailwindcss">
        :root { --kr-gov-blue:#00378b; --kr-gov-border-light:#d9d9d9; --kr-gov-radius:5px; --kr-gov-text-primary:#1a1a1a; --kr-gov-text-secondary:#4d4d4d; --kr-gov-bg-gray:#f2f2f2; }
        @layer base { body { font-family:'Noto Sans KR','Public Sans',sans-serif; -webkit-font-smoothing:antialiased; } }
        .gov-card { @apply border border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] bg-white p-6 shadow-sm; }
        .material-symbols-outlined { font-size:24px; line-height:1.4; }
    </style>
</head>
<body class="bg-[var(--kr-gov-bg-gray)] text-[var(--kr-gov-text-primary)]">
<div th:replace="~{egovframework/com/common/fragments/header_en :: header}"></div>
<main class="max-w-7xl mx-auto px-4 lg:px-8 py-10">
    <section class="gov-card max-w-4xl mx-auto">
        <div class="flex items-start gap-4">
            <span class="material-symbols-outlined text-[42px] text-[var(--kr-gov-blue)]" th:text="${placeholderIcon}">web</span>
            <div>
                <h2 class="text-3xl font-black mb-2" th:text="${placeholderTitleEn}">Menu Screen</h2>
                <p class="text-sm text-[var(--kr-gov-text-secondary)]">This shared screen keeps existing database menu entries reachable until the detailed service page is implemented.</p>
            </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8">
            <div class="rounded-[var(--kr-gov-radius)] border border-[var(--kr-gov-border-light)] p-4">
                <p class="text-xs font-bold text-[var(--kr-gov-text-secondary)] mb-2">Menu Code</p>
                <p class="font-bold" th:text="${placeholderCode}">H0000000</p>
            </div>
            <div class="rounded-[var(--kr-gov-radius)] border border-[var(--kr-gov-border-light)] p-4">
                <p class="text-xs font-bold text-[var(--kr-gov-text-secondary)] mb-2">Mapped URL</p>
                <p class="font-bold break-all" th:text="${placeholderUrl}">/sample</p>
            </div>
        </div>
    </section>
</main>
<div th:replace="~{egovframework/com/common/fragments/footer_en :: footer}"></div>
</body>
</html>
