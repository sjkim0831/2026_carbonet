<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta th:if="${_csrf != null}" name="_csrf" th:content="${_csrf.token}">
    <meta th:if="${_csrf != null}" name="_csrf_header" th:content="${_csrf.headerName}">
    <title th:text="${reactShellTitle}">React App Shell</title>
    <meta name="description" th:content="${reactShellDescription}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Public+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="${reactAppProdCss}">
    <style>
        body {
            margin: 0;
            background: linear-gradient(180deg, #eef5f7 0%, #f8fbfc 100%);
            color: #10233f;
            font-family: "Pretendard GOV", "Noto Sans KR", sans-serif;
        }
        .react-shell-fallback {
            width: min(960px, calc(100% - 40px));
            margin: 48px auto;
            padding: 28px;
            border: 1px solid rgba(16, 35, 63, 0.08);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.88);
            box-shadow: 0 20px 60px rgba(16, 35, 63, 0.08);
        }
        .react-shell-fallback code {
            font-family: "JetBrains Mono", monospace;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script th:inline="javascript">
    window.__CARBONET_REACT_APP__ = {
        route: [[${reactRoute}]],
        locale: [[${reactLocale}]],
        admin: [[${reactAdmin}]],
        devUrl: [[${reactAppDevUrl}]],
        prodJs: [[${reactAppProdJs}]]
    };
</script>
<script type="module">
    const config = window.__CARBONET_REACT_APP__ || {};
    const search = new URLSearchParams(window.location.search);
    const useDevServer = search.get("dev") === "1";

    const script = document.createElement("script");
    script.type = "module";
    script.src = useDevServer ? `${config.devUrl}/src/main.tsx` : config.prodJs;
    script.onerror = () => {
        console.error("React bundle could not be loaded.", config.prodJs);
    };
    document.body.appendChild(script);
</script>
</body>
</html>
