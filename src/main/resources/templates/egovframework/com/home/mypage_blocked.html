<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta th:if="${_csrf != null}" name="_csrf" th:content="${_csrf.token}"/>
<meta th:if="${_csrf != null}" name="_csrf_header" th:content="${_csrf.headerName}"/>
<title>접속 제한 안내 - CCUS 통합관리 포털</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&amp;family=Public+Sans:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        :root {
            --kr-gov-blue: #00378b;
            --kr-gov-blue-hover: #002d72;
            --kr-gov-text-primary: #1a1a1a;
            --kr-gov-text-secondary: #4d4d4d;
            --kr-gov-border-light: #d9d9d9;
            --kr-gov-bg-gray: #f2f2f2;
            --kr-gov-radius: 5px;
            --kr-gov-error: #d32f2f;
        }
        @layer base {
            body { font-family: 'Noto Sans KR', 'Public Sans', sans-serif; -webkit-font-smoothing: antialiased; }
            .skip-link {
                @apply absolute -top-full left-0 bg-[var(--kr-gov-blue)] text-white p-3 z-[100] transition-all focus:top-0 focus:outline-none focus:ring-2 focus:ring-white;
            }
        }
        .material-symbols-outlined {
            font-variation-settings: 'wght' 400, 'opsz' 24;
            font-size: 24px;
        }
    </style>
</head>
<body class="bg-[var(--kr-gov-bg-gray)] text-[var(--kr-gov-text-primary)] min-h-screen flex flex-col">
<a class="skip-link" href="#main-content">본문 바로가기</a>
<main class="flex-grow flex flex-col items-center justify-center py-12 px-4" id="main-content">
<div class="w-full max-w-[640px] bg-white border border-[var(--kr-gov-border-light)] rounded-lg shadow-sm overflow-hidden p-8 md:p-12 text-center">
<div class="mb-6 flex justify-center">
<div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-[48px] text-[var(--kr-gov-error)]">block</span>
</div>
</div>
<h2 class="text-2xl font-bold mb-4">마이페이지 접속 제한</h2>
<p class="text-lg font-medium mb-8">현재 회원 상태에서는 마이페이지에 접속할 수 없습니다.</p>
<div class="bg-gray-50 border border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] p-6 mb-8 text-left">
<dl class="space-y-3">
<div class="flex border-b border-gray-200 pb-2">
<dt class="w-32 text-sm font-bold text-[var(--kr-gov-text-secondary)]">아이디</dt>
<dd class="text-sm" th:text="${userId}">-</dd>
</div>
<div class="flex border-b border-gray-200 pb-2">
<dt class="w-32 text-sm font-bold text-[var(--kr-gov-text-secondary)]">소속 기관</dt>
<dd class="text-sm" th:text="${companyName}">-</dd>
</div>
<div class="flex">
<dt class="w-32 text-sm font-bold text-[var(--kr-gov-text-secondary)]">상태 코드</dt>
<dd class="text-sm" th:text="${memberStatus}">-</dd>
</div>
</dl>
</div>
<p class="text-sm text-[var(--kr-gov-text-secondary)] mb-8">계정 상태가 <strong>정상</strong>으로 변경된 뒤에만 접근할 수 있습니다. 운영자에게 문의해 주세요.</p>
<div class="flex flex-col sm:flex-row gap-3 justify-center">
<a class="min-w-[160px] h-12 flex items-center justify-center bg-[var(--kr-gov-blue)] text-white font-bold rounded-[var(--kr-gov-radius)] hover:bg-[var(--kr-gov-blue-hover)] transition-colors" href="/home">홈으로 이동</a>
<button id="logoutBtn" type="button" class="min-w-[160px] h-12 flex items-center justify-center border border-[var(--kr-gov-border-light)] font-bold rounded-[var(--kr-gov-radius)] hover:bg-gray-50 transition-colors">로그아웃</button>
</div>
</div>
</main>
<script>
  document.getElementById('logoutBtn')?.addEventListener('click', function () {
    fetch('/signin/actionLogout', { method: 'POST', headers: { 'Content-Type': 'application/json' } })
      .then(function (r) { return r.json(); })
      .then(function () { location.href = '/home'; })
      .catch(function () { location.href = '/home'; });
  });
</script>
<script src="/js/accessibility.js" defer></script>
</body>
</html>
