<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>회원사 가입 현황 조회 - CCUS 통합관리 포털</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&amp;family=Public+Sans:wght@400;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style type="text/tailwindcss">
        :root {
            --kr-gov-blue: #00378b;
            --kr-gov-blue-hover: #002d72;
            --kr-gov-text-primary: #1a1a1a;
            --kr-gov-text-secondary: #4d4d4d;
            --kr-gov-border-light: #d9d9d9;
            --kr-gov-focus: #005fde;
            --kr-gov-bg-gray: #f8f9fa;
            --kr-gov-radius: 5px;
            --kr-gov-emerald: #059669;
        }
        @layer base {
            body { font-family: 'Noto Sans KR', 'Public Sans', sans-serif; -webkit-font-smoothing: antialiased; }
            .skip-link {
                @apply absolute -top-full left-0 bg-[var(--kr-gov-blue)] text-white p-3 z-[100] transition-all focus:top-0 focus:outline-none focus:ring-2 focus:ring-white;
            }
        }
        .material-symbols-outlined {
            font-variation-settings: 'wght' 400, 'opsz' 24;
            font-size: 24px;
        }
        .nav-item {
            @apply px-4 py-2 font-bold text-[var(--kr-gov-text-primary)] hover:text-[var(--kr-gov-blue)] transition-colors relative;
        }
        .tab-active {
            @apply bg-white border-t-2 border-x border-[var(--kr-gov-border-light)] border-t-[var(--kr-gov-blue)] text-[var(--kr-gov-blue)] font-bold -mb-[1px] z-10;
        }
        .tab-inactive {
            @apply bg-gray-50 border border-[var(--kr-gov-border-light)] text-[var(--kr-gov-text-secondary)] hover:bg-white transition-colors;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#00378b",
                        "gov-gray": "#767676",
                    },
                    borderRadius: {
                        'gov': '5px',
                    }
                },
            },
        }
    </script>
</head>

<body class="bg-[var(--kr-gov-bg-gray)] text-[var(--kr-gov-text-primary)] min-h-screen flex flex-col">
    <a class="skip-link" href="#main-content">본문 바로가기</a>
    <div id="shared-header" th:replace="egovframework/com/common/fragments/header :: header"></div>

    <main class="flex-grow py-12 px-4" id="main-content">
        <div class="max-w-3xl mx-auto text-center mb-12">
            <h2 class="text-3xl font-black text-[var(--kr-gov-text-primary)] mb-4">회원사 가입 신청 현황 조회</h2>
            <p class="text-[var(--kr-gov-text-secondary)] text-lg leading-relaxed">
                회원사 등록 신청 시 입력한 정보를 통해 현재 진행 상태를 조회하실 수 있습니다.
            </p>
            <div th:if="${errorMessage}"
                class="mt-6 p-4 bg-red-50 border border-red-200 rounded-gov text-red-600 font-bold">
                <p th:text="${errorMessage}"></p>
            </div>
        </div>
        <div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            <div
                class="lg:col-span-12 bg-white border border-[var(--kr-gov-border-light)] rounded-lg shadow-sm overflow-hidden">
                <div class="flex h-14" role="tablist" aria-label="조회 방식 선택">
                    <button type="button" class="flex-1 text-[16px] tab-active" id="tab-biz" role="tab" aria-selected="true" tabindex="0">사업자등록번호로 조회</button>
                    <button type="button" class="flex-1 text-[16px] tab-inactive" id="tab-app" role="tab" aria-selected="false" tabindex="-1">신청번호로 조회</button>
                </div>
                <div class="p-8 lg:p-10">
                    <!-- Form for Search -->
                    <form id="searchForm" class="space-y-6" aria-label="가입 현황 조회 폼">
                        <div class="space-y-5">
                            <div id="input-biz">
                                <label class="block text-sm font-bold text-[var(--kr-gov-text-primary)] mb-2"
                                    for="biz-no">
                                    사업자등록번호 <span class="text-red-500">*</span>
                                </label>
                                <div class="flex gap-2">
                                    <input
                                        class="flex-1 h-14 px-4 border border-[var(--kr-gov-border-light)] rounded-gov focus:ring-2 focus:ring-[var(--kr-gov-focus)] focus:border-transparent"
                                        id="biz-no" name="bizNo" placeholder="000-00-00000 (숫자만 입력)" type="text" maxlength="10" inputmode="numeric" pattern="[0-9]{10}" autocomplete="off" />
                                </div>
                            </div>
                            <div id="input-app" class="hidden">
                                <label class="block text-sm font-bold text-[var(--kr-gov-text-primary)] mb-2"
                                    for="app-no">
                                    신청번호 <span class="text-red-500">*</span>
                                </label>
                                <div class="flex gap-2">
                                    <input
                                        class="flex-1 h-14 px-4 border border-[var(--kr-gov-border-light)] rounded-gov focus:ring-2 focus:ring-[var(--kr-gov-focus)] focus:border-transparent"
                                        id="app-no" name="appNo" placeholder="APP-YYYYMMDD-XXX" type="text" autocomplete="off" />
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-[var(--kr-gov-text-primary)] mb-2"
                                    for="rep-name">
                                    대표자명 <span class="text-red-500">*</span>
                                </label>
                                <input
                                    class="w-full h-14 px-4 border border-[var(--kr-gov-border-light)] rounded-gov focus:ring-2 focus:ring-[var(--kr-gov-focus)] focus:border-transparent"
                                    id="rep-name" name="repName" placeholder="대표자 성함을 입력하세요" type="text" autocomplete="name" />
                            </div>
                        </div>
                        <div class="bg-gray-50 p-6 rounded-gov border border-[var(--kr-gov-border-light)]">
                            <div class="flex items-start gap-4">
                                <div class="pt-1">
                                    <span class="material-symbols-outlined text-[var(--kr-gov-blue)]">security</span>
                                </div>
                                <div class="flex-1">
                                    <h4 class="font-bold text-sm mb-1">본인확인 단계</h4>
                                    <p class="text-xs text-[var(--kr-gov-text-secondary)] mb-4">안전한 정보 조회를 위해 본인인증이
                                        필요합니다.</p>
                                    <button
                                        class="flex items-center gap-2 px-4 py-3 bg-white border border-[var(--kr-gov-border-light)] rounded-gov hover:bg-gray-50 transition-colors w-full justify-center font-bold text-sm"
                                        type="button" onclick="alert('본인인증을 진행합니다.')">
                                        <span class="material-symbols-outlined text-[18px]">smartphone</span>
                                        본인인증 (휴대폰 등)
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <label class="inline-flex items-start cursor-pointer group">
                                <input
                                    class="mt-1 w-5 h-5 rounded border-[var(--kr-gov-border-light)] text-[var(--kr-gov-blue)] focus:ring-[var(--kr-gov-focus)]"
                                    id="agree-check" name="agreeCheck" type="checkbox" />
                                <span class="ml-3 text-sm text-[var(--kr-gov-text-secondary)] leading-relaxed">
                                    조회를 위한 개인정보 수집 및 이용에 동의합니다. (필수)
                                </span>
                            </label>
                        </div>
                        <button
                            class="w-full h-16 bg-[var(--kr-gov-blue)] text-white text-xl font-bold rounded-gov hover:bg-[var(--kr-gov-blue-hover)] transition-colors shadow-lg"
                            type="button" id="btnSearch">
                            조회하기
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div id="shared-footer" th:replace="egovframework/com/common/fragments/footer :: footer"></div>

    <script th:inline="javascript">
        const tabBiz = document.getElementById('tab-biz');
        const tabApp = document.getElementById('tab-app');
        const inputBiz = document.getElementById('input-biz');
        const inputApp = document.getElementById('input-app');

        tabBiz.addEventListener('click', () => {
            tabBiz.className = 'flex-1 text-[16px] tab-active';
            tabApp.className = 'flex-1 text-[16px] tab-inactive';
            tabBiz.setAttribute('aria-selected', 'true');
            tabBiz.setAttribute('tabindex', '0');
            tabApp.setAttribute('aria-selected', 'false');
            tabApp.setAttribute('tabindex', '-1');
            inputBiz.classList.remove('hidden');
            inputApp.classList.add('hidden');
        });

        tabApp.addEventListener('click', () => {
            tabApp.className = 'flex-1 text-[16px] tab-active';
            tabBiz.className = 'flex-1 text-[16px] tab-inactive';
            tabApp.setAttribute('aria-selected', 'true');
            tabApp.setAttribute('tabindex', '0');
            tabBiz.setAttribute('aria-selected', 'false');
            tabBiz.setAttribute('tabindex', '-1');
            inputApp.classList.remove('hidden');
            inputBiz.classList.add('hidden');
        });

        document.getElementById('btnSearch').addEventListener('click', function () {
            const agree = document.getElementById('agree-check').checked;
            if (!agree) {
                alert('개인정보 수집 및 이용에 동의하셔야 합니다.');
                return;
            }
            const repName = document.getElementById('rep-name').value.trim();
            if (!repName) {
                alert('대표자명을 입력해주세요.');
                return;
            }

            const isBizTab = !inputBiz.classList.contains('hidden');
            let query = "?repName=" + encodeURIComponent(repName);

            if (isBizTab) {
                const bizNo = document.getElementById('biz-no').value.trim();
                if (!bizNo) {
                    alert('사업자등록번호를 입력해주세요.');
                    return;
                }
                query += "&bizNo=" + encodeURIComponent(bizNo);
            } else {
                const appNo = document.getElementById('app-no').value.trim();
                if (!appNo) {
                    alert('신청번호를 입력해주세요.');
                    return;
                }
                query += "&appNo=" + encodeURIComponent(appNo);
            }

            location.href = '/join/companyJoinStatusDetail' + query;
        });

        (function syncHeaderLinks() {
            const ko = document.getElementById('langKoBtn');
            const en = document.getElementById('langEnBtn');
            const mobileKo = document.getElementById('mobileLangKoBtn');
            const mobileEn = document.getElementById('mobileLangEnBtn');
            if (ko) ko.href = '/join/companyJoinStatusSearch';
            if (en) en.href = '/join/en/companyJoinStatusSearch';
            if (mobileKo) mobileKo.href = '/join/companyJoinStatusSearch';
            if (mobileEn) mobileEn.href = '/join/en/companyJoinStatusSearch';
        })();
    </script>
<script src="/js/accessibility.js" defer></script>
</body>

</html>
