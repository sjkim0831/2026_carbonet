<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>본인확인 - CCUS 통합관리 포털</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&amp;family=Public+Sans:wght@400;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style type="text/tailwindcss">
        :root {
            --kr-gov-blue: #00378b;
            --kr-gov-blue-hover: #002d72;
            --kr-gov-green: #008450;
            --kr-gov-text-primary: #1a1a1a;
            --kr-gov-text-secondary: #4d4d4d;
            --kr-gov-border-light: #d9d9d9;
            --kr-gov-focus: #005fde;
            --kr-gov-bg-gray: #f2f2f2;
            --kr-gov-radius: 5px;
        }
        @layer base {
            body { font-family: 'Noto Sans KR', 'Public Sans', sans-serif; -webkit-font-smoothing: antialiased; }
            .skip-link {
                @apply absolute -top-full left-0 bg-[var(--kr-gov-blue)] text-white p-3 z-[100] transition-all focus:top-0 focus:outline-none focus:ring-2 focus:ring-white;
            }
        }
        .material-symbols-outlined {
            font-variation-settings: 'wght' 400, 'opsz' 24;
            font-size: 24px;
        }
        .step-item {
            @apply flex flex-col items-center relative flex-1;
        }
        .step-circle {
            @apply w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold border-2 z-10 bg-white;
        }
        .step-active .step-circle {
            @apply bg-[var(--kr-gov-blue)] border-[var(--kr-gov-blue)] text-white ring-4 ring-blue-100;
        }
        .step-completed .step-circle {
            @apply bg-white border-[var(--kr-gov-blue)] text-[var(--kr-gov-blue)];
        }
        .step-inactive .step-circle {
            @apply border-[var(--kr-gov-border-light)] text-[var(--kr-gov-text-secondary)];
        }
        .step-line {
            @apply absolute top-5 left-1/2 w-full h-[2px] bg-[var(--kr-gov-border-light)];
        }
        .step-completed .step-line {
            @apply bg-[var(--kr-gov-blue)];
        }
        .auth-card {
            @apply flex flex-col items-center p-10 bg-white border border-[var(--kr-gov-border-light)] rounded-xl transition-all hover:border-[var(--kr-gov-blue)] hover:shadow-xl text-center cursor-pointer h-full outline-none focus:ring-4 focus:ring-blue-100;
        }
        .icon-box {
            @apply w-24 h-24 rounded-full bg-slate-50 flex items-center justify-center mb-8 transition-colors group-hover:bg-blue-50;
        }
        .icon-box .material-symbols-outlined {
            font-variation-settings: 'wght' 300, 'opsz' 24;
            font-size: 48px;
            color: var(--kr-gov-blue);
        }
        /* 회원가입 페이지: 헤더 로그인 버튼/내비게이션 숨김 */
        #loginBtn { display: none !important; }
        header nav { display: none !important; }
        .gov-btn { display: none !important; }
        /* KO/EN 버튼: KO 활성 */
        #langKoBtn { @apply bg-[var(--kr-gov-blue)] text-white; }
        #langEnBtn { @apply bg-white text-[var(--kr-gov-text-secondary)] hover:bg-gray-100; }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#00378b",
                        "gov-gray": "#767676",
                    },
                    borderRadius: {
                        'gov': '5px',
                    }
                },
            },
        }
    </script>
</head>

<body class="bg-[var(--kr-gov-bg-gray)] text-[var(--kr-gov-text-primary)] min-h-screen flex flex-col">
    <a class="skip-link" href="#main-content">본문 바로가기</a>
    <!-- 헤더: home3에서 공유 -->
    <div id="shared-header"></div>

    <main class="flex-grow py-12 px-4" id="main-content">
        <div class="max-w-5xl mx-auto">
            <!-- 제목 -->
            <div class="text-center mb-10">
                <h2 class="text-3xl font-bold text-[var(--kr-gov-text-primary)] mb-2">회원가입</h2>
                <p class="text-[var(--kr-gov-text-secondary)]">안전한 서비스 이용을 위해 본인확인을 진행해 주세요.</p>
            </div>
            <!-- 진행 표시 -->
            <div class="max-w-5xl mx-auto mb-12">
                <div class="flex justify-between relative">
                    <div class="step-item step-completed">
                        <div class="step-line"></div>
                        <div class="step-circle"><span class="material-symbols-outlined !text-[20px]">check</span></div>
                        <span class="mt-3 text-sm font-medium text-[var(--kr-gov-text-secondary)]">회원유형</span>
                    </div>
                    <div class="step-item step-completed">
                        <div class="step-line"></div>
                        <div class="step-circle"><span class="material-symbols-outlined !text-[20px]">check</span></div>
                        <span class="mt-3 text-sm font-medium text-[var(--kr-gov-text-secondary)]">약관 동의</span>
                    </div>
                    <div class="step-item step-active">
                        <div class="step-line"></div>
                        <div class="step-circle">03</div>
                        <span class="mt-3 text-sm font-bold text-[var(--kr-gov-blue)]">본인 확인</span>
                    </div>
                    <div class="step-item step-inactive">
                        <div class="step-line"></div>
                        <div class="step-circle">04</div>
                        <span class="mt-3 text-sm font-medium text-[var(--kr-gov-text-secondary)]">정보 입력</span>
                    </div>
                    <div class="step-item step-inactive">
                        <div class="step-circle">05</div>
                        <span class="mt-3 text-sm font-medium text-[var(--kr-gov-text-secondary)]">가입 완료</span>
                    </div>
                </div>
            </div>

            <form id="authForm" action="/join/step4" method="post" aria-label="본인인증 수단 선택"
                class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl mx-auto mb-16">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="auth_method" id="auth_method" value="" />

                <!-- 1. 디지털 원패스 -->
                <button onclick="submitAuth('ONEPASS')" class="auth-card group" type="button">
                    <div class="icon-box">
                        <span class="material-symbols-outlined">smartphone</span>
                    </div>
                    <h3 class="text-lg font-bold mb-3">디지털 원패스</h3>
                    <p class="text-xs text-[var(--kr-gov-text-secondary)] leading-relaxed">
                        하나의 아이디로 모든<br />정부 서비스를 이용합니다.
                    </p>
                </button>

                <!-- 2. 공동인증서 -->
                <button onclick="submitAuth('JOINT')" class="auth-card group" type="button">
                    <div class="icon-box">
                        <span class="material-symbols-outlined">verified_user</span>
                    </div>
                    <h3 class="text-lg font-bold mb-3">공동인증서</h3>
                    <p class="text-xs text-[var(--kr-gov-text-secondary)] leading-relaxed">
                        기존 공인인증서를 사용하여<br />본인을 확인합니다.
                    </p>
                </button>

                <!-- 3. 금융인증서 -->
                <button onclick="submitAuth('FINANCIAL')" class="auth-card group" type="button">
                    <div class="icon-box">
                        <span class="material-symbols-outlined">account_balance</span>
                    </div>
                    <h3 class="text-lg font-bold mb-3">금융인증서</h3>
                    <p class="text-xs text-[var(--kr-gov-text-secondary)] leading-relaxed">
                        클라우드 기반의 금융인증서로<br />간편하게 인증합니다.
                    </p>
                </button>

                <!-- 4. 간편인증 -->
                <button onclick="submitAuth('SIMPLE')" class="auth-card group" type="button">
                    <div class="icon-box">
                        <span class="material-symbols-outlined">qr_code_scanner</span>
                    </div>
                    <h3 class="text-lg font-bold mb-3">간편인증 (카카오, 토스 등)</h3>
                    <p class="text-xs text-[var(--kr-gov-text-secondary)] leading-relaxed">
                        민간 인증서의 간편한<br />인증 절차를 이용합니다.
                    </p>
                </button>

                <!-- 5. 이메일 인증 (해외 사용자) -->
                <button onclick="submitAuth('EMAIL')" class="auth-card group" type="button">
                    <div class="icon-box">
                        <span class="material-symbols-outlined">mail</span>
                    </div>
                    <h3 class="text-lg font-bold mb-3">이메일 인증</h3>
                    <p class="text-xs text-[var(--kr-gov-text-secondary)] leading-relaxed">
                        해외 거주자 또는 이메일을 통한<br />본인확인이 필요한 경우 이용합니다.
                    </p>
                </button>
            </form>
            <div class="flex items-center justify-center">
                <button onclick="history.back()"
                    class="w-48 h-14 border border-[var(--kr-gov-border-light)] bg-white text-[var(--kr-gov-text-primary)] flex items-center justify-center rounded-[var(--kr-gov-radius)] font-bold hover:bg-gray-50 transition-colors"
                    type="button">
                    <span class="material-symbols-outlined mr-2">arrow_back</span>
                    이전 단계
                </button>
            </div>
            <div class="max-w-5xl mx-auto mt-20 bg-white border border-[var(--kr-gov-border-light)] p-8 rounded-lg">
                <div class="flex gap-4">
                    <span class="material-symbols-outlined text-blue-600 mt-0.5">info</span>
                    <div class="text-[15px] text-[var(--kr-gov-text-secondary)]">
                        <p class="font-bold text-[var(--kr-gov-text-primary)] mb-2">본인인증 안내사항</p>
                        <ul class="list-disc ml-5 space-y-1.5">
                            <li>입력하신 본인확인 정보는 가입 시 입력된 정보와 일치해야 합니다.</li>
                            <li>타인의 명의를 도용하여 본인확인을 진행할 경우 관련 법령에 따라 처벌받을 수 있습니다.</li>
                            <li>인증 과정에서 발생하는 문제는 각 인증 수단별 고객센터로 문의해 주시기 바랍니다.</li>
                            <li>법인 회원의 경우, 담당자 개인의 본인인증이 필요할 수 있습니다.</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <!-- 푸터: home3에서 공유 -->
    <div id="shared-footer"></div>
    <script>
            (function loadSharedLayout() {
                fetch('/home/fragments/header')
                    .then(r => r.text()).then(html => {
                        document.getElementById('shared-header').innerHTML = html;
                        // KO/EN 버튼에 링크 연결 (step3+ 는 POST 전용이라 step1으로 이동)
                        const ko = document.getElementById('langKoBtn');
                        const en = document.getElementById('langEnBtn');
                        if (ko) ko.onclick = () => location.href = '/join/step1';
                        if (en) en.onclick = () => location.href = '/join/en/step1';
                    })
                    .catch(() => { });
                fetch('/home/fragments/footer')
                    .then(r => r.text()).then(html => { document.getElementById('shared-footer').innerHTML = html; })
                    .catch(() => { });
            })();

        function submitAuth(method) {
            // 실제 모듈 연결 전까지는 Mock 데이터를 세션에 저장하도록 처리
            document.getElementById('auth_method').value = method;

            if (method === 'JOINT' || method === 'FINANCIAL') {
                // 인증서 팝업 시뮬레이션
                const url = method === 'JOINT' ? 'http://localhost:9000/certlogin/utl/sec/certVar.do' : 'http://localhost:9000/certlogin/utl/sec/certVar.do';
                window.open(url, 'certPopup', 'width=500,height=600');
                // 실제로는 팝업 콜백에서 폼을 전송하겠지만, 여기서는 예시로 바로 전송
                setTimeout(() => document.getElementById('authForm').submit(), 1000);
            } else if (method === 'ONEPASS') {
                window.open('http://localhost:9000/gnrlogin/utl/sec/certVar.do', 'gnrPopup', 'width=500,height=600');
                setTimeout(() => document.getElementById('authForm').submit(), 1000);
            } else if (method === 'SIMPLE') {
                // 간편인증 API 호출 시뮬레이션
                console.log("간편인증 요청 시작");
                document.getElementById('authForm').submit();
            } else if (method === 'EMAIL') {
                // 이메일 인증 유동적 처리 (실제로는 이메일 입력창 등이 뜰 것)
                const userEmail = prompt("인증할 이메일 주소를 입력해 주세요.");
                if (userEmail) {
                    alert(userEmail + " 경로로 인증번호를 발송했습니다. (Mock)");
                    document.getElementById('authForm').submit();
                }
            } else {
                document.getElementById('authForm').submit();
            }
        }
    </script>
<script src="/js/accessibility.js" defer></script>
</body>

</html>
