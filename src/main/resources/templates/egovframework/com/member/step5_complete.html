<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>회원가입 완료 | CCUS 통합관리 포털</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&amp;family=Public+Sans:wght@400;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style type="text/tailwindcss">
        :root {
            --kr-gov-blue: #00378b;
            --kr-gov-blue-hover: #002d72;
            --kr-gov-text-primary: #1a1a1a;
            --kr-gov-text-secondary: #4d4d4d;
            --kr-gov-border-light: #d9d9d9;
            --kr-gov-focus: #005fde;
            --kr-gov-bg-gray: #f2f2f2;
            --kr-gov-radius: 5px;
            --kr-gov-error: #d32f2f;
        }
        @layer base {
            body { font-family: 'Noto Sans KR', 'Public Sans', sans-serif; -webkit-font-smoothing: antialiased; }
            .skip-link {
                @apply absolute -top-full left-0 bg-[var(--kr-gov-blue)] text-white p-3 z-[100] transition-all focus:top-0 focus:outline-none focus:ring-2 focus:ring-white;
            }
            .focus-visible:focus-visible {
                outline: 3px solid var(--kr-gov-focus);
                outline-offset: 2px;
            }
        }
        .material-symbols-outlined {
            font-variation-settings: 'wght' 400, 'opsz' 24;
            font-size: 24px;
        }
        .step-item {
            @apply flex flex-col items-center relative flex-1;
        }
        .step-circle {
            @apply w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold border-2 z-10 bg-white;
        }
        .step-active .step-circle {
            @apply bg-[var(--kr-gov-blue)] border-[var(--kr-gov-blue)] text-white ring-4 ring-blue-100;
        }
        .step-completed .step-circle {
            @apply bg-white border-[var(--kr-gov-blue)] text-[var(--kr-gov-blue)];
        }
        .step-inactive .step-circle {
            @apply border-[var(--kr-gov-border-light)] text-[var(--kr-gov-text-secondary)];
        }
        .step-line {
            @apply absolute top-5 left-1/2 w-full h-[2px] bg-[var(--kr-gov-border-light)];
        }
        .step-completed .step-line {
            @apply bg-[var(--kr-gov-blue)];
        }
        /* 회원가입 페이지: 헤더 로그인 버튼/내비게이션 숨김 */
        #loginBtn { display: none !important; }
        header nav { display: none !important; }
        .gov-btn { display: none !important; }
        /* KO/EN 버튼: KO 활성 */
        #langKoBtn { @apply bg-[var(--kr-gov-blue)] text-white; }
        #langEnBtn { @apply bg-white text-[var(--kr-gov-text-secondary)] hover:bg-gray-100; }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#00378b",
                        "gov-gray": "#767676",
                        "mandatory": "#d32f2f",
                    },
                    borderRadius: {
                        'gov': '5px',
                    }
                },
            },
        }
    </script>
</head>

<body class="bg-[var(--kr-gov-bg-gray)] text-[var(--kr-gov-text-primary)] min-h-screen flex flex-col">
    <a class="skip-link" href="#main-content">본문 바로가기</a>
    <!-- 헤더: home3에서 공유 -->
    <div id="shared-header"></div>

    <main class="flex-grow py-12 px-4" id="main-content">
        <div class="max-w-5xl mx-auto">
            <!-- 제목 -->
            <div class="text-center mb-10">
                <h2 class="text-3xl font-bold text-[var(--kr-gov-text-primary)] mb-2">회원가입</h2>
                <p class="text-[var(--kr-gov-text-secondary)]">가입 신청이 완료되었습니다.</p>
            </div>
            <!-- 진행 표시 -->
            <div class="max-w-5xl mx-auto mb-12">
                <div class="flex justify-between relative">
                    <div class="step-item step-completed">
                        <div class="step-line"></div>
                        <div class="step-circle"><span class="material-symbols-outlined !text-[20px]">check</span></div>
                        <span class="mt-3 text-sm font-medium text-[var(--kr-gov-text-secondary)]">회원유형</span>
                    </div>
                    <div class="step-item step-completed">
                        <div class="step-line"></div>
                        <div class="step-circle"><span class="material-symbols-outlined !text-[20px]">check</span></div>
                        <span class="mt-3 text-sm font-medium text-[var(--kr-gov-text-secondary)]">약관 동의</span>
                    </div>
                    <div class="step-item step-completed">
                        <div class="step-line"></div>
                        <div class="step-circle"><span class="material-symbols-outlined !text-[20px]">check</span></div>
                        <span class="mt-3 text-sm font-medium text-[var(--kr-gov-text-secondary)]">본인 확인</span>
                    </div>
                    <div class="step-item step-completed">
                        <div class="step-line"></div>
                        <div class="step-circle"><span class="material-symbols-outlined !text-[20px]">check</span></div>
                        <span class="mt-3 text-sm font-medium text-[var(--kr-gov-text-secondary)]">정보 입력</span>
                    </div>
                    <div class="step-item step-active">
                        <div class="step-circle">05</div>
                        <span class="mt-3 text-sm font-bold text-[var(--kr-gov-blue)]">가입 완료</span>
                    </div>
                </div>
            </div>

            <div
                class="bg-white border border-[var(--kr-gov-border-light)] rounded-lg shadow-sm p-8 lg:p-12 text-center"
                role="status" aria-live="polite">
                <div
                    class="mb-6 inline-flex items-center justify-center w-20 h-20 rounded-full bg-blue-50 text-[var(--kr-gov-blue)]">
                    <span class="material-symbols-outlined text-[48px]"
                        style="font-variation-settings: 'wght' 600;">check_circle</span>
                </div>
                <h3 class="text-2xl font-bold text-[var(--kr-gov-text-primary)] mb-4">가입 신청 완료</h3>
                <p class="text-lg text-[var(--kr-gov-text-primary)] font-medium mb-2">회원가입 신청이 정상적으로 완료되었습니다.</p>
                <div class="bg-gray-50 border border-gray-100 p-6 rounded-lg mb-10 text-left max-w-xl mx-auto">
                    <p class="text-[var(--kr-gov-text-secondary)] text-sm leading-relaxed mb-4">
                        운영자의 승인이 완료된 후 모든 서비스를 이용하실 수 있습니다.<br />
                        승인 결과는 등록하신 이메일과 SMS로 안내해 드립니다.
                    </p>
                    <div class="border-t border-gray-200 pt-4 space-y-2">
                        <div class="flex justify-between items-center">
                            <span class="text-sm font-bold text-gray-500">이름</span>
                            <span class="text-sm font-medium text-[var(--kr-gov-text-primary)]"
                                th:text="${mberNm}">홍길동</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm font-bold text-gray-500">아이디</span>
                            <span class="text-sm font-medium text-[var(--kr-gov-text-primary)]"
                                th:text="${mberId}">ccus_user_01</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm font-bold text-gray-500">소속 기관</span>
                            <span class="text-sm font-medium text-[var(--kr-gov-text-primary)]"
                                th:text="${insttNm}">한국에너지공단</span>
                        </div>
                    </div>
                </div>
                <div class="flex flex-col gap-4">
                    <a class="flex items-center justify-center h-14 bg-[var(--kr-gov-blue)] text-white text-lg font-bold rounded-[var(--kr-gov-radius)] hover:bg-[var(--kr-gov-blue-hover)] transition-colors focus-visible"
                        href="/">
                        홈으로 이동
                    </a>
                </div>
            </div>
            <p class="mt-8 text-sm text-[var(--kr-gov-text-secondary)] text-center">
                승인과 관련된 문의사항은 관리자(02-1234-5678)에게 문의하시기 바랍니다.
            </p>
        </div>
    </main>
    <!-- 푸터: home3에서 공유 -->
    <div id="shared-footer"></div>
    <script>
            (function loadSharedLayout() {
                fetch('/home/fragments/header')
                    .then(r => r.text()).then(html => {
                        document.getElementById('shared-header').innerHTML = html;
                        // KO/EN 버튼에 현재 스텝 링크 연결 (step5: 완료 페이지라 step1로 연결)
                        const ko = document.getElementById('langKoBtn');
                        const en = document.getElementById('langEnBtn');
                        if (ko) ko.onclick = () => location.href = '/join/step1';
                        if (en) en.onclick = () => location.href = '/join/en/step1';
                    })
                    .catch(() => { });
                fetch('/home/fragments/footer')
                    .then(r => r.text()).then(html => { document.getElementById('shared-footer').innerHTML = html; })
                    .catch(() => { });
            })();
    </script>
<script src="/js/accessibility.js" defer></script>
</body>

</html>
