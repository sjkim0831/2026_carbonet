<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>회원사 등록 신청 완료 | CCUS 통합관리 포털</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&amp;family=Public+Sans:wght@400;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style type="text/tailwindcss">
        :root {
            --kr-gov-blue: #00378b;
            --kr-gov-blue-hover: #002d72;
            --kr-gov-text-primary: #1a1a1a;
            --kr-gov-text-secondary: #4d4d4d;
            --kr-gov-border-light: #d9d9d9;
            --kr-gov-focus: #005fde;
            --kr-gov-bg-gray: #f2f2f2;
            --kr-gov-radius: 5px;
            --kr-gov-error: #d32f2f;
            --kr-gov-success: #2e7d32;
        }
        @layer base {
            body { 
                font-family: 'Noto Sans KR', 'Public Sans', sans-serif; 
                -webkit-font-smoothing: antialiased; 
                @apply bg-[var(--kr-gov-bg-gray)] text-[var(--kr-gov-text-primary)];
            }
            .skip-link {
                @apply absolute -top-full left-0 bg-[var(--kr-gov-blue)] text-white p-3 z-[100] transition-all focus:top-0 focus:outline-none focus:ring-2 focus:ring-white;
            }
        }
        .material-symbols-outlined {
            font-variation-settings: 'wght' 400, 'opsz' 24;
            font-size: 24px;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#00378b",
                        "gov-gray": "#767676",
                    },
                    borderRadius: {
                        'gov': '5px',
                    }
                },
            },
        }
    </script>
</head>

<body class="min-h-screen flex flex-col">
    <a class="skip-link" href="#main-content">본문 바로가기</a>

    <div id="shared-header"></div>

    <main class="flex-grow py-16 px-4" id="main-content">
        <div class="max-w-3xl mx-auto">
            <div class="text-center mb-12" role="status" aria-live="polite">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-emerald-50 rounded-full mb-6">
                    <span class="material-symbols-outlined text-5xl text-emerald-600"
                        style="font-variation-settings: 'wght' 600;">check_circle</span>
                </div>
                <h2 class="text-3xl font-bold text-[var(--kr-gov-text-primary)] mb-4">회원사 등록 신청 완료</h2>
                <p class="text-lg text-[var(--kr-gov-text-secondary)]">신규 회원사 등록 신청이 정상적으로 완료되었습니다.</p>
            </div>

            <div class="space-y-6">
                <div class="bg-white border border-blue-100 rounded-lg p-8 shadow-sm relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1.5 h-full bg-[var(--kr-gov-blue)]"></div>
                    <div class="flex items-start gap-4">
                        <span class="material-symbols-outlined text-blue-600 mt-0.5">info</span>
                        <div>
                            <h3 class="font-bold text-[var(--kr-gov-text-primary)] mb-2">승인 절차 안내</h3>
                            <p class="text-[var(--kr-gov-text-secondary)] leading-relaxed">
                                제출하신 서류는 담당자가 확인 후 <span class="text-[var(--kr-gov-blue)] font-bold">영업일 기준 2~3일
                                    이내</span>에 승인 여부가 결정됩니다.<br />
                                최종 승인 결과는 회원정보에 등록된 <span class="font-bold">SMS 및 이메일</span>로 개별 안내 드립니다.
                            </p>
                        </div>
                    </div>
                </div>

                <section class="bg-white border border-[var(--kr-gov-border-light)] rounded-lg overflow-hidden">
                    <div class="bg-gray-50 px-6 py-4 border-b border-[var(--kr-gov-border-light)]">
                        <h3 class="font-bold text-[var(--kr-gov-text-primary)]">신청 내역 요약</h3>
                    </div>
                    <div class="p-6">
                        <dl class="grid grid-cols-1 sm:grid-cols-[140px_1fr] gap-y-4 text-sm">
                            <dt class="text-[var(--kr-gov-text-secondary)] font-medium">신청 기관명</dt>
                            <dd class="text-[var(--kr-gov-text-primary)] font-bold" th:text="${insttNm}">한국에너지기술연구소</dd>
                            <dt class="text-[var(--kr-gov-text-secondary)] font-medium">사업자등록번호</dt>
                            <dd class="text-[var(--kr-gov-text-primary)] font-bold" th:text="${bizrno}">123-45-67890
                            </dd>
                            <dt class="text-[var(--kr-gov-text-secondary)] font-medium">신청 일시</dt>
                            <dd class="text-[var(--kr-gov-text-primary)] font-bold" th:text="${regDate}">2025.08.14
                                14:30:45</dd>
                        </dl>
                    </div>
                </section>

                <div class="flex flex-col items-center gap-6 pt-6">
                    <a class="w-full sm:w-64 h-14 flex items-center justify-center bg-[var(--kr-gov-blue)] text-white text-lg font-bold rounded-[var(--kr-gov-radius)] hover:bg-[var(--kr-gov-blue-hover)] transition-colors shadow-lg shadow-blue-900/10"
                        th:href="@{/home}">
                        홈으로 이동
                    </a>
                    <div class="flex items-center gap-2 text-sm">
                        <span class="text-[var(--kr-gov-text-secondary)]">신청 현황이 궁금하신가요?</span>
                        <a class="text-[var(--kr-gov-blue)] font-bold hover:underline underline-offset-4 flex items-center gap-1"
                            href="/join/companyJoinStatusSearch">
                            조회 안내 <span class="material-symbols-outlined text-sm">arrow_forward</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="shared-footer"></div>
    <script>
            (function loadSharedLayout() {
                fetch('/home/fragments/header')
                    .then(r => r.text())
                    .then(html => {
                        document.getElementById('shared-header').innerHTML = html;
                        // 로고 클릭 시 세션 초기화 후 메인으로
                        const logoLink = document.querySelector('#shared-header a[href="/home"]');
                        if (logoLink) logoLink.href = '/join/reset';
                    })
                    .catch(() => { });

                fetch('/home/fragments/footer')
                    .then(r => r.text())
                    .then(html => { document.getElementById('shared-footer').innerHTML = html; })
                    .catch(() => { });
            })();
    </script>

<script src="/js/accessibility.js" defer></script>
</body>

</html>
