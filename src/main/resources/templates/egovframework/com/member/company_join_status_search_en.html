<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Membership Application Status - CCUS Integrated Management Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&amp;family=Public+Sans:wght@400;600;700&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <style type="text/tailwindcss">
        :root {
            --kr-gov-blue: #00378b;
            --kr-gov-blue-hover: #002d72;
            --kr-gov-text-primary: #1a1a1a;
            --kr-gov-text-secondary: #4d4d4d;
            --kr-gov-border-light: #d9d9d9;
            --kr-gov-focus: #005fde;
            --kr-gov-bg-gray: #f8f9fa;
            --kr-gov-radius: 5px;
        }
        @layer base {
            body { font-family: 'Noto Sans KR', 'Public Sans', sans-serif; -webkit-font-smoothing: antialiased; }
            .skip-link {
                @apply absolute -top-full left-0 bg-[var(--kr-gov-blue)] text-white p-3 z-[100] transition-all focus:top-0 focus:outline-none focus:ring-2 focus:ring-white;
            }
        }
        .material-symbols-outlined {
            font-variation-settings: 'wght' 400, 'opsz' 24;
            font-size: 24px;
        }
        .tab-active {
            @apply bg-white border-t-2 border-x border-[var(--kr-gov-border-light)] border-t-[var(--kr-gov-blue)] text-[var(--kr-gov-blue)] font-bold -mb-[1px] z-10;
        }
        .tab-inactive {
            @apply bg-gray-50 border border-[var(--kr-gov-border-light)] text-[var(--kr-gov-text-secondary)] hover:bg-white transition-colors;
        }
    </style>
</head>
<body class="bg-[var(--kr-gov-bg-gray)] text-[var(--kr-gov-text-primary)] min-h-screen flex flex-col">
    <a class="skip-link" href="#main-content">Skip to content</a>
    <div id="shared-header" th:replace="egovframework/com/common/fragments/header_en :: header"></div>

    <main class="flex-grow py-12 px-4" id="main-content">
        <div class="max-w-3xl mx-auto text-center mb-12">
            <h2 class="text-3xl font-black text-[var(--kr-gov-text-primary)] mb-4">Check Membership Application Status</h2>
            <p class="text-[var(--kr-gov-text-secondary)] text-lg leading-relaxed">
                You can check the current status of your membership application using the information entered during registration.
            </p>
            <div th:if="${errorMessage}" class="mt-6 p-4 bg-red-50 border border-red-200 rounded-gov text-red-600 font-bold">
                <p th:text="${errorMessage}"></p>
            </div>
        </div>

        <div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            <div class="lg:col-span-12 bg-white border border-[var(--kr-gov-border-light)] rounded-lg shadow-sm overflow-hidden">
                <div class="flex h-14" role="tablist" aria-label="Search method">
                    <button type="button" class="flex-1 text-[16px] tab-active" id="tab-biz" role="tab" aria-selected="true" tabindex="0">Search by Business Number</button>
                    <button type="button" class="flex-1 text-[16px] tab-inactive" id="tab-app" role="tab" aria-selected="false" tabindex="-1">Search by Application Number</button>
                </div>
                <div class="p-8 lg:p-10">
                    <form id="searchForm" class="space-y-6" aria-label="Membership status search form">
                        <div class="space-y-5">
                            <div id="input-biz">
                                <label class="block text-sm font-bold text-[var(--kr-gov-text-primary)] mb-2" for="biz-no">
                                    Business Registration Number <span class="text-red-500">*</span>
                                </label>
                                <input class="w-full h-14 px-4 border border-[var(--kr-gov-border-light)] rounded-gov focus:ring-2 focus:ring-[var(--kr-gov-focus)] focus:border-transparent"
                                    id="biz-no" name="bizNo" placeholder="000-00-00000 (numbers only)" type="text" maxlength="10" inputmode="numeric" pattern="[0-9]{10}" autocomplete="off" />
                            </div>
                            <div id="input-app" class="hidden">
                                <label class="block text-sm font-bold text-[var(--kr-gov-text-primary)] mb-2" for="app-no">
                                    Application Number <span class="text-red-500">*</span>
                                </label>
                                <input class="w-full h-14 px-4 border border-[var(--kr-gov-border-light)] rounded-gov focus:ring-2 focus:ring-[var(--kr-gov-focus)] focus:border-transparent"
                                    id="app-no" name="appNo" placeholder="APP-YYYYMMDD-XXX" type="text" autocomplete="off" />
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-[var(--kr-gov-text-primary)] mb-2" for="rep-name">
                                    Representative Name <span class="text-red-500">*</span>
                                </label>
                                <input class="w-full h-14 px-4 border border-[var(--kr-gov-border-light)] rounded-gov focus:ring-2 focus:ring-[var(--kr-gov-focus)] focus:border-transparent"
                                    id="rep-name" name="repName" placeholder="Enter the representative name" type="text" autocomplete="name" />
                            </div>
                        </div>

                        <div class="bg-gray-50 p-6 rounded-gov border border-[var(--kr-gov-border-light)]">
                            <div class="flex items-start gap-4">
                                <span class="material-symbols-outlined text-[var(--kr-gov-blue)] mt-1">security</span>
                                <div class="flex-1">
                                    <h4 class="font-bold text-sm mb-1">Identity verification</h4>
                                    <p class="text-xs text-[var(--kr-gov-text-secondary)] mb-4">Identity verification is required to securely check application information.</p>
                                    <button class="flex items-center gap-2 px-4 py-3 bg-white border border-[var(--kr-gov-border-light)] rounded-gov hover:bg-gray-50 transition-colors w-full justify-center font-bold text-sm"
                                        type="button" onclick="alert('Identity verification will be provided later.')">
                                        <span class="material-symbols-outlined text-[18px]">smartphone</span>
                                        Verify identity
                                    </button>
                                </div>
                            </div>
                        </div>

                        <label class="inline-flex items-start cursor-pointer group">
                            <input class="mt-1 w-5 h-5 rounded border-[var(--kr-gov-border-light)] text-[var(--kr-gov-blue)] focus:ring-[var(--kr-gov-focus)]" id="agree-check" name="agreeCheck" type="checkbox" />
                            <span class="ml-3 text-sm text-[var(--kr-gov-text-secondary)] leading-relaxed">
                                I agree to the collection and use of personal information for status inquiry. (Required)
                            </span>
                        </label>

                        <button class="w-full h-16 bg-[var(--kr-gov-blue)] text-white text-xl font-bold rounded-gov hover:bg-[var(--kr-gov-blue-hover)] transition-colors shadow-lg"
                            type="button" id="btnSearch">
                            Search
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div id="shared-footer" th:replace="egovframework/com/common/fragments/footer_en :: footer"></div>

    <script>
        const tabBiz = document.getElementById('tab-biz');
        const tabApp = document.getElementById('tab-app');
        const inputBiz = document.getElementById('input-biz');
        const inputApp = document.getElementById('input-app');

        tabBiz.addEventListener('click', () => {
            tabBiz.className = 'flex-1 text-[16px] tab-active';
            tabApp.className = 'flex-1 text-[16px] tab-inactive';
            tabBiz.setAttribute('aria-selected', 'true');
            tabApp.setAttribute('aria-selected', 'false');
            inputBiz.classList.remove('hidden');
            inputApp.classList.add('hidden');
        });

        tabApp.addEventListener('click', () => {
            tabApp.className = 'flex-1 text-[16px] tab-active';
            tabBiz.className = 'flex-1 text-[16px] tab-inactive';
            tabApp.setAttribute('aria-selected', 'true');
            tabBiz.setAttribute('aria-selected', 'false');
            inputApp.classList.remove('hidden');
            inputBiz.classList.add('hidden');
        });

        document.getElementById('btnSearch').addEventListener('click', function () {
            if (!document.getElementById('agree-check').checked) {
                alert('You must agree to the collection and use of personal information.');
                return;
            }

            const repName = document.getElementById('rep-name').value.trim();
            if (!repName) {
                alert('Please enter the representative name.');
                return;
            }

            const isBizTab = !inputBiz.classList.contains('hidden');
            let query = '?repName=' + encodeURIComponent(repName);

            if (isBizTab) {
                const bizNo = document.getElementById('biz-no').value.trim();
                if (!bizNo) {
                    alert('Please enter the business registration number.');
                    return;
                }
                query += '&bizNo=' + encodeURIComponent(bizNo);
            } else {
                const appNo = document.getElementById('app-no').value.trim();
                if (!appNo) {
                    alert('Please enter the application number.');
                    return;
                }
                query += '&appNo=' + encodeURIComponent(appNo);
            }

            location.href = '/join/en/companyJoinStatusDetail' + query;
        });

        (function syncHeaderLinks() {
            const ko = document.getElementById('langKoBtn');
            const en = document.getElementById('langEnBtn');
            const mobileKo = document.getElementById('mobileLangKoBtn');
            const mobileEn = document.getElementById('mobileLangEnBtn');
            if (ko) ko.href = '/join/companyJoinStatusSearch';
            if (en) en.href = '/join/en/companyJoinStatusSearch';
            if (mobileKo) mobileKo.href = '/join/companyJoinStatusSearch';
            if (mobileEn) mobileEn.href = '/join/en/companyJoinStatusSearch';
        })();
    </script>
    <script src="/js/accessibility.js" defer></script>
</body>
</html>
