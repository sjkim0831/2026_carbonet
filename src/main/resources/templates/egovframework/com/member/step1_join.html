<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>회원유형 선택 - CCUS 통합관리 포털</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&amp;family=Public+Sans:wght@400;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style type="text/tailwindcss">
        :root {
            --kr-gov-blue: #00378b;
            --kr-gov-blue-hover: #002d72;
            --kr-gov-green: #008450;
            --kr-gov-text-primary: #1a1a1a;
            --kr-gov-text-secondary: #4d4d4d;
            --kr-gov-border-light: #d9d9d9;
            --kr-gov-focus: #005fde;
            --kr-gov-bg-gray: #f2f2f2;
            --kr-gov-radius: 5px;
        }
        @layer base {
            body { font-family: 'Noto Sans KR', 'Public Sans', sans-serif; -webkit-font-smoothing: antialiased; }
            .skip-link {
                @apply absolute -top-full left-0 bg-[var(--kr-gov-blue)] text-white p-3 z-[100] transition-all focus:top-0 focus:outline-none focus:ring-2 focus:ring-white;
            }
        }
        .material-symbols-outlined {
            font-variation-settings: 'wght' 400, 'opsz' 24;
            font-size: 24px;
        }
        .step-item {
            @apply flex flex-col items-center relative flex-1;
        }
        .step-circle {
            @apply w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold border-2 z-10 bg-white;
        }
        .step-active .step-circle {
            @apply bg-[var(--kr-gov-blue)] border-[var(--kr-gov-blue)] text-white ring-4 ring-blue-100;
        }
        .step-completed .step-circle {
            @apply bg-white border-[var(--kr-gov-blue)] text-[var(--kr-gov-blue)];
        }
        .step-inactive .step-circle {
            @apply border-[var(--kr-gov-border-light)] text-[var(--kr-gov-text-secondary)];
        }
        .step-line {
            @apply absolute top-5 left-1/2 w-full h-[2px] bg-[var(--kr-gov-border-light)];
        }
        .step-completed .step-line {
            @apply bg-[var(--kr-gov-blue)];
        }
        .type-card {
            @apply flex flex-col items-center p-8 bg-white border-2 border-[var(--kr-gov-border-light)] rounded-xl transition-all hover:border-[var(--kr-gov-blue)] hover:shadow-lg text-center cursor-pointer relative h-full;
        }
        .type-card input:checked + .card-content {
            @apply border-[var(--kr-gov-blue)] bg-blue-50/30;
        }
        .type-card.active {
            @apply border-[var(--kr-gov-blue)] bg-blue-50/30;
        }
        .type-card.active .check-icon {
            @apply block;
        }
        /* 회원가입 페이지: 헤더 로그인 버튼/내비게이션 숨김 */
        #loginBtn { display: none !important; }
        header nav { display: none !important; }
        .gov-btn { display: none !important; }
        /* KO/EN 버튼: KO 활성 */
        #langKoBtn { @apply bg-[var(--kr-gov-blue)] text-white; }
        #langEnBtn { @apply bg-white text-[var(--kr-gov-text-secondary)] hover:bg-gray-100; }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#00378b",
                        "gov-gray": "#767676",
                    },
                    borderRadius: {
                        'gov': '5px',
                    }
                },
            },
        }
    </script>
</head>

<body class="bg-[var(--kr-gov-bg-gray)] text-[var(--kr-gov-text-primary)] min-h-screen flex flex-col">
    <a class="skip-link" href="#main-content">본문 바로가기</a>
    <!-- 헤더: home3에서 공유 -->
    <div id="shared-header"></div>

    <main class="flex-grow py-12 px-4" id="main-content">
        <form id="joinForm" action="/join/step2" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div class="max-w-5xl mx-auto">
                <!-- 제목 -->
                <div class="text-center mb-10">
                    <h2 class="text-3xl font-bold text-[var(--kr-gov-text-primary)] mb-2">회원가입</h2>
                    <p class="text-[var(--kr-gov-text-secondary)]">사용자 환경에 맞는 회원 유형을 선택해 주세요.</p>
                </div>
                <!-- 진행 표시 -->
                <div class="max-w-5xl mx-auto mb-12">
                    <div class="flex justify-between relative">
                        <div class="step-item step-active">
                            <div class="step-line"></div>
                            <div class="step-circle">01</div>
                            <span class="mt-3 text-sm font-bold text-[var(--kr-gov-blue)]">회원유형 선택</span>
                        </div>
                        <div class="step-item step-inactive">
                            <div class="step-line"></div>
                            <div class="step-circle">02</div>
                            <span class="mt-3 text-sm font-medium text-[var(--kr-gov-text-secondary)]">약관 동의</span>
                        </div>
                        <div class="step-item step-inactive">
                            <div class="step-line"></div>
                            <div class="step-circle">03</div>
                            <span class="mt-3 text-sm font-medium text-[var(--kr-gov-text-secondary)]">본인 확인</span>
                        </div>
                        <div class="step-item step-inactive">
                            <div class="step-line"></div>
                            <div class="step-circle">04</div>
                            <span class="mt-3 text-sm font-medium text-[var(--kr-gov-text-secondary)]">정보 입력</span>
                        </div>
                        <div class="step-item step-inactive">
                            <div class="step-circle">05</div>
                            <span class="mt-3 text-sm font-medium text-[var(--kr-gov-text-secondary)]">가입 완료</span>
                        </div>
                    </div>
                </div>

                <fieldset class="mb-12">
                    <legend class="sr-only">회원 유형 선택</legend>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    <label class="type-card group" th:classappend="${currType == 'EMITTER' ? 'active' : ''}">
                        <input class="sr-only" name="membership_type" type="radio" value="EMITTER"
                            required
                            th:checked="${currType == 'EMITTER'}" />
                        <div
                            class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mb-6 group-hover:bg-[var(--kr-gov-blue)] transition-colors">
                            <span
                                class="material-symbols-outlined text-4xl text-[var(--kr-gov-blue)] group-hover:text-white">factory</span>
                        </div>
                        <h3 class="text-lg font-bold mb-3 break-keep">CO2 배출 및 포집 기업</h3>
                        <p class="text-sm text-[var(--kr-gov-text-secondary)] leading-relaxed">
                            이산화탄소를 배출하거나<br />포집 시설을 운영하는 기업
                        </p>
                        <div class="check-icon absolute top-4 right-4 text-[var(--kr-gov-blue)]"
                            th:classappend="${currType == 'EMITTER' ? '' : 'hidden'}">
                            <span class="material-symbols-outlined text-3xl"
                                style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        </div>
                    </label>
                    <label class="type-card group" th:classappend="${currType == 'PERFORMER' ? 'active' : ''}">
                        <input class="sr-only" name="membership_type" type="radio" value="PERFORMER"
                            th:checked="${currType == 'PERFORMER'}" />
                        <div
                            class="w-20 h-20 bg-cyan-50 rounded-full flex items-center justify-center mb-6 group-hover:bg-cyan-700 transition-colors">
                            <span
                                class="material-symbols-outlined text-4xl text-cyan-600 group-hover:text-white">settings_suggest</span>
                        </div>
                        <h3 class="text-lg font-bold mb-3 break-keep">CCUS 사업 수행 기업</h3>
                        <p class="text-sm text-[var(--kr-gov-text-secondary)] leading-relaxed">
                            수송·저장 및 활용 등<br />CCUS 사업을 수행하는 기업
                        </p>
                        <div class="check-icon absolute top-4 right-4 text-[var(--kr-gov-blue)]"
                            th:classappend="${currType == 'PERFORMER' ? '' : 'hidden'}">
                            <span class="material-symbols-outlined text-3xl"
                                style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        </div>
                    </label>
                    <label class="type-card group" th:classappend="${currType == 'CENTER' ? 'active' : ''}">
                        <input class="sr-only" name="membership_type" type="radio" value="CENTER"
                            th:checked="${currType == 'CENTER'}" />
                        <div
                            class="w-20 h-20 bg-emerald-50 rounded-full flex items-center justify-center mb-6 group-hover:bg-[var(--kr-gov-green)] transition-colors">
                            <span
                                class="material-symbols-outlined text-4xl text-[var(--kr-gov-green)] group-hover:text-white">hub</span>
                        </div>
                        <h3 class="text-lg font-bold mb-3 break-keep">CCUS 진흥센터</h3>
                        <p class="text-sm text-[var(--kr-gov-text-secondary)] leading-relaxed">
                            시스템 운영 및 CCUS 기술<br />진흥 업무를 담당하는 기관
                        </p>
                        <div class="check-icon absolute top-4 right-4 text-[var(--kr-gov-blue)]"
                            th:classappend="${currType == 'CENTER' ? '' : 'hidden'}">
                            <span class="material-symbols-outlined text-3xl"
                                style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        </div>
                    </label>
                    <label class="type-card group" th:classappend="${currType == 'GOV' ? 'active' : ''}">
                        <input class="sr-only" name="membership_type" type="radio" value="GOV"
                            th:checked="${currType == 'GOV'}" />
                        <div
                            class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mb-6 group-hover:bg-slate-700 transition-colors">
                            <span
                                class="material-symbols-outlined text-4xl text-slate-600 group-hover:text-white">account_balance</span>
                        </div>
                        <h3 class="text-lg font-bold mb-3 break-keep">주무관청 / 행정기관</h3>
                        <p class="text-sm text-[var(--kr-gov-text-secondary)] leading-relaxed">
                            정책 수립 및 관리를 담당하는<br />정부 부처 및 행정기관
                        </p>
                        <div class="check-icon absolute top-4 right-4 text-[var(--kr-gov-blue)]"
                            th:classappend="${currType == 'GOV' ? '' : 'hidden'}">
                            <span class="material-symbols-outlined text-3xl"
                                style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        </div>
                    </label>
                    </div>
                </fieldset>
                <div class="flex items-center justify-center gap-4">
                    <a class="w-40 h-14 border border-[var(--kr-gov-border-light)] bg-white text-[var(--kr-gov-text-primary)] flex items-center justify-center rounded-[var(--kr-gov-radius)] font-bold hover:bg-gray-50 transition-colors"
                        href="/join/reset">
                        홈으로
                    </a>
                    <button type="submit"
                        class="w-40 h-14 bg-[var(--kr-gov-blue)] text-white flex items-center justify-center rounded-[var(--kr-gov-radius)] font-bold hover:bg-[var(--kr-gov-blue-hover)] transition-colors">
                        다음 단계
                    </button>
                </div>
                <div class="max-w-5xl mx-auto mt-16 bg-white border border-[var(--kr-gov-border-light)] p-6 rounded-lg">
                    <div class="flex gap-3">
                        <span class="material-symbols-outlined text-blue-600">help</span>
                        <div class="text-sm text-[var(--kr-gov-text-secondary)]">
                            <p class="font-bold text-[var(--kr-gov-text-primary)] mb-1">회원가입 관련 안내</p>
                            <ul class="list-disc ml-4 space-y-1">
                                <li>기업 회원은 사업자등록번호 인증이 필요합니다.</li>
                                <li>수행 기업 및 진흥센터 회원은 관련 승인 절차가 진행될 수 있습니다.</li>
                                <li>기관 회원은 소속 기관의 인증서 또는 공문 확인이 필요할 수 있습니다.</li>
                                <li>가입 과정에서 입력하신 정보는 관련 법령에 따라 철저히 관리됩니다.</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </main>
    <!-- 푸터: home3에서 공유 -->
    <div id="shared-footer"></div>
    <script>
        (function handleExpiredAlert() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('expired') === '1') {
                alert('세션이 만료되었습니다. 회원가입을 처음부터 다시 진행해 주세요.');
                params.delete('expired');
                const newQuery = params.toString();
                const cleanUrl = window.location.pathname + (newQuery ? `?${newQuery}` : '');
                window.history.replaceState({}, document.title, cleanUrl);
            }
        })();

        // home3에서 공유 헤더/푸터를 fetch
        (function loadSharedLayout() {
                fetch('/home/fragments/header')
                    .then(r => r.text())
                    .then(html => {
                        document.getElementById('shared-header').innerHTML = html;
                        // 1. 로고 클릭 시 세션 초기화 후 메인으로
                        const logoLink = document.querySelector('#shared-header a[href="/home"]');
                        if (logoLink) logoLink.href = '/join/reset';

                        // 2. 언어 변경 시 세션 초기화 후 1단계로 강제 이동 (init=T 추가)
                        const ko = document.getElementById('langKoBtn');
                        const en = document.getElementById('langEnBtn');
                        if (ko) ko.onclick = () => location.href = '/join/step1?init=T';
                        if (en) en.onclick = () => location.href = '/join/en/step1?init=T';
                    })
                    .catch(() => { });

                fetch('/home/fragments/footer')
                    .then(r => r.text())
                    .then(html => { document.getElementById('shared-footer').innerHTML = html; })
                    .catch(() => { });
        })();

        // Step1 type-card 선택 로직
        document.querySelectorAll('.type-card').forEach(card => {
            card.addEventListener('click', function () {
                const radio = this.querySelector('input[type="radio"]');
                const val = radio.value;

                document.querySelectorAll('.type-card').forEach(c => {
                    c.classList.remove('active');
                    c.querySelector('.check-icon').classList.add('hidden');
                });

                this.classList.add('active');
                this.querySelector('.check-icon').classList.remove('hidden');
                radio.checked = true;

                // 실시간 세션 저장 (POST)
                fetch('/join/saveStep1', {
                    method: 'POST',
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest',
                        'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8'
                    },
                    body: `membership_type=${encodeURIComponent(val)}`
                });
            });
        });
    </script>
<script src="/js/accessibility.js" defer></script>
</body>

</html>
