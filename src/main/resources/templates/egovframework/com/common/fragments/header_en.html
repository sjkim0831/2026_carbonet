<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="header">
        <input th:if="${_csrf != null}" type="hidden" id="site-csrf-token" th:value="${_csrf.token}" />
        <input th:if="${_csrf != null}" type="hidden" id="site-csrf-header" th:value="${_csrf.headerName}" />
        <style>
            .gov-btn { padding: 0.625rem 1.25rem; font-weight: 700; border-radius: var(--kr-gov-radius); transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease; outline: none; }
            body.mobile-menu-open { overflow: hidden; }
        </style>
        <div class="bg-[var(--kr-gov-bg-gray)] border-b border-[var(--kr-gov-border-light)]">
            <div class="max-w-7xl mx-auto px-4 lg:px-8 py-2 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <img alt="Government Symbol of the Republic of Korea" class="h-4" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD8BPzqtzSLVGSrjt4mzhhVBy9SocCRDssk1F3XRVu7Xq9jHh7qzzt48wFi8qduCiJmB0LRQczPB7waPe3h0gkjn3jOEDxt6UJSJjdXNf8P-4WlM2BEZrfg2SL91uSiZrFcCk9KYrsdg-biTS9dtJ_OIghDBEVoAzMc33XcCYR_UP0QQdoYzBe840YrtH40xGyB9MSr0QH4D0foqlvOhG0jX8CDayXNlDsSKlfClVd3K2aodlwg4xSxgXHB3vnnnA0L2yNBNihQQg0" />
                    <span class="text-[13px] font-medium text-[var(--kr-gov-text-secondary)]">Official Website of the Republic of Korea Government</span>
                </div>
                <div class="hidden md:flex items-center gap-4 text-xs font-medium text-[var(--kr-gov-text-secondary)]">
                    <p>This website complies with the 2025 Digital Government UI/UX Guidelines.</p>
                </div>
            </div>
        </div>
        <header class="bg-white border-b border-[var(--kr-gov-border-light)] sticky top-0 z-50 shadow-sm">
            <div class="max-w-7xl mx-auto px-4 lg:px-8">
                <div class="relative flex items-center h-24">
                    <div aria-hidden="true" class="xl:hidden w-11 h-11 shrink-0"></div>
                    <div class="absolute left-1/2 -translate-x-1/2 xl:static xl:translate-x-0 flex items-center gap-3 shrink-0">
                        <a class="flex items-center gap-2 focus-visible max-w-[78vw] xl:max-w-none" href="/en/home">
                            <span class="material-symbols-outlined text-[32px] text-[var(--kr-gov-blue)]" style="font-variation-settings: 'wght' 600;">eco</span>
                            <div class="flex flex-col">
                                <h1 class="text-base sm:text-xl font-bold tracking-tight text-[var(--kr-gov-text-primary)] leading-tight">CCUS Footprint Platform</h1>
                                <p class="hidden 2xl:block text-[10px] text-[var(--kr-gov-text-secondary)] font-bold uppercase tracking-wider">Carbon Footprint Platform</p>
                            </div>
                        </a>
                    </div>
                    <nav class="hidden xl:flex items-center h-full ml-4 2xl:ml-8 flex-1 justify-center min-w-0" aria-label="Main menu">
<div class="gnb-item h-full relative group" th:each="top : ${homeMenu}">
<a class="h-full flex items-center px-2 text-[13px] font-bold whitespace-nowrap tracking-[-0.01em] text-[var(--kr-gov-text-primary)] border-b-4 border-transparent hover:text-[var(--kr-gov-blue)] hover:border-[var(--kr-gov-blue)] transition-all focus-visible" th:href="${top.url}" th:text="${top.label}">Menu</a>
<div class="gnb-depth2 hidden absolute top-full left-0 bg-white border border-[var(--kr-gov-border-light)] shadow-lg rounded-b-[var(--kr-gov-radius)] py-2" th:if="${!#lists.isEmpty(top.sections)}">
<div class="gnb-sections">
<div class="gnb-section" th:each="section : ${top.sections}">
<strong class="gnb-section-title" th:text="${section.label}">Section</strong>
<a class="block px-4 py-2 hover:bg-gray-50 text-sm" th:each="item : ${section.items}" th:href="${item.url}" th:text="${item.label}">Item</a>
</div>
</div>
</div>
</div>
</nav>

                    <div class="ml-auto flex items-center gap-2 shrink-0">
                        <div class="hidden xl:flex border border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] overflow-hidden">
                            <a id="langKoBtn" class="px-2 py-1 text-xs bg-white text-[var(--kr-gov-text-secondary)] hover:bg-gray-100 font-bold focus-visible inline-flex items-center" href="/home">KO</a>
                            <a id="langEnBtn" class="px-2 py-1 text-xs bg-[var(--kr-gov-blue)] text-white font-bold focus-visible border-l border-[var(--kr-gov-border-light)] inline-flex items-center" href="/en/home">EN</a>
                        </div>
                        <button th:if="${isLoggedIn}" id="logoutBtn" type="button" class="hidden xl:inline-flex gov-btn bg-[var(--kr-gov-blue)] text-white hover:bg-[var(--kr-gov-blue-hover)]" onclick="performLogout('/en/signin/actionLogout', 'reload');">Logout</button>
                        <a th:unless="${isLoggedIn}" id="loginBtn" class="hidden xl:inline-flex gov-btn bg-[var(--kr-gov-blue)] text-white hover:bg-[var(--kr-gov-blue-hover)] items-center" href="/en/signin/loginView">Login</a>
                        <a th:unless="${isLoggedIn}" class="hidden xl:inline-flex gov-btn items-center border border-[var(--kr-gov-blue)] bg-white text-[var(--kr-gov-blue)] hover:bg-[var(--kr-gov-bg-gray)] whitespace-nowrap" href="/join/en/step1">Sign Up</a>
                        <button id="mobile-menu-toggle" class="xl:hidden w-11 h-11 rounded-[var(--kr-gov-radius)] border border-[var(--kr-gov-border-light)] text-[var(--kr-gov-blue)] flex items-center justify-center hover:bg-[var(--kr-gov-bg-gray)] focus-visible" type="button" aria-controls="mobile-menu" aria-expanded="false" aria-label="Open all menu"><span class="material-symbols-outlined">menu</span></button>
                    </div>
                </div>
            </div>
        </header>
        <div id="mobile-menu" class="xl:hidden fixed inset-0 z-[70] hidden" aria-hidden="true">
            <button type="button" id="mobile-menu-backdrop" class="absolute inset-0 bg-black/50" aria-label="Close all menu"></button>
            <aside class="absolute top-0 right-0 h-full w-[90%] max-w-[380px] bg-white shadow-2xl border-l border-[var(--kr-gov-border-light)] overflow-y-auto">
                <div class="sticky top-0 z-10 flex items-center justify-between px-4 py-4 border-b border-[var(--kr-gov-border-light)] bg-white">
                    <strong class="text-lg font-bold text-[var(--kr-gov-text-primary)]">All Menu</strong>
                    <button id="mobile-menu-close" class="w-10 h-10 rounded-[var(--kr-gov-radius)] border border-[var(--kr-gov-border-light)] text-[var(--kr-gov-text-secondary)] flex items-center justify-center hover:bg-[var(--kr-gov-bg-gray)]" type="button" aria-label="Close all menu"><span class="material-symbols-outlined">close</span></button>
                </div>
                <div class="p-4 space-y-4">
                    <div class="flex items-center gap-2">
                        <a th:if="${isLoggedIn}" class="gov-btn bg-[var(--kr-gov-blue)] text-white hover:bg-[var(--kr-gov-blue-hover)] inline-flex items-center justify-center flex-1" href="#" onclick="performLogout('/en/signin/actionLogout', 'reload'); return false;">Logout</a>
                        <a th:unless="${isLoggedIn}" class="gov-btn bg-[var(--kr-gov-blue)] text-white hover:bg-[var(--kr-gov-blue-hover)] inline-flex items-center justify-center flex-1" href="/en/signin/loginView">Login</a>
                        <a th:unless="${isLoggedIn}" class="gov-btn bg-white text-[var(--kr-gov-blue)] border border-[var(--kr-gov-blue)] hover:bg-[var(--kr-gov-bg-gray)] inline-flex items-center justify-center flex-1" href="/join/en/step1">Sign Up</a>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-sm">
                        <a id="mobileLangKoBtn" class="px-3 py-2 border border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] bg-white text-[var(--kr-gov-text-secondary)] font-bold text-center" href="/home">KO</a>
                        <a id="mobileLangEnBtn" class="px-3 py-2 border border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] bg-[var(--kr-gov-blue)] text-white font-bold text-center" href="/en/home">EN</a>
                    </div>
                </div>
            </aside>
        </div>
    </div>
    <script>
        (function () {
            var toggleBtn = document.getElementById('mobile-menu-toggle');
            var menu = document.getElementById('mobile-menu');
            var closeBtn = document.getElementById('mobile-menu-close');
            var backdrop = document.getElementById('mobile-menu-backdrop');
            if (!toggleBtn || !menu || !closeBtn || !backdrop) return;
            function openMenu() { menu.classList.remove('hidden'); document.body.classList.add('mobile-menu-open'); toggleBtn.setAttribute('aria-expanded', 'true'); menu.setAttribute('aria-hidden', 'false'); }
            function closeMenu() { menu.classList.add('hidden'); document.body.classList.remove('mobile-menu-open'); toggleBtn.setAttribute('aria-expanded', 'false'); menu.setAttribute('aria-hidden', 'true'); }
            toggleBtn.addEventListener('click', function () { if (menu.classList.contains('hidden')) { openMenu(); } else { closeMenu(); } });
            closeBtn.addEventListener('click', closeMenu);
            backdrop.addEventListener('click', closeMenu);
            window.addEventListener('keydown', function (event) { if (event.key === 'Escape') closeMenu(); });
        })();
    </script>
    <script src="/js/accessibility.js" defer></script>
</body>
</html>
