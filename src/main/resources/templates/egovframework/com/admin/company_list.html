<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>회원사 목록 조회 - CCUS 통합관리 시스템</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&amp;family=Public+Sans:wght@400;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style type="text/tailwindcss">
        :root {
            --kr-gov-blue: #00378b;
            --kr-gov-blue-hover: #002d72;
            --kr-gov-green: #006b5d;
            --kr-gov-text-primary: #1a1a1a;
            --kr-gov-text-secondary: #4d4d4d;
            --kr-gov-border-light: #d9d9d9;
            --kr-gov-focus: #005fde;
            --kr-gov-bg-gray: #f2f2f2;
            --kr-gov-radius: 5px;
        }
        @layer base {
            body { font-family: 'Noto Sans KR', 'Public Sans', sans-serif; -webkit-font-smoothing: antialiased; }
            .skip-link {
                @apply absolute -top-full left-0 bg-[var(--kr-gov-blue)] text-white p-3 z-[100] transition-all focus:top-0 focus:outline-none focus:ring-2 focus:ring-white;
            }
        }
        .material-symbols-outlined {
            font-variation-settings: 'wght' 400, 'opsz' 24;
            font-size: 24px;
            line-height: 1.6;
        }
        .admin-sidebar-link {
            @apply flex items-center gap-3 px-4 py-3 text-[15px] font-medium text-[var(--kr-gov-text-secondary)] hover:bg-gray-100 rounded-[var(--kr-gov-radius)] transition-colors;
        }
        .admin-sidebar-link.active {
            @apply bg-[var(--kr-gov-blue)] text-white font-bold;
        }
        .admin-sidebar-sublink {
            @apply flex items-center gap-2 pl-12 pr-4 py-2 text-[14px] text-[var(--kr-gov-text-secondary)] hover:text-[var(--kr-gov-blue)] hover:font-bold transition-all;
        }
        .admin-sidebar-sublink.active {
            @apply text-[var(--kr-gov-blue)] font-bold relative;
        }
        .admin-sidebar-sublink.active::before {
            content: '';
            @apply absolute left-8 w-1.5 h-1.5 bg-[var(--kr-gov-blue)] rounded-full top-1/2 -translate-y-1/2;
        }
        .gov-card {
            @apply border border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] bg-white p-6 shadow-sm;
        }
        .help-tooltip {
            @apply invisible opacity-0 absolute right-0 top-full mt-2 w-72 p-4 bg-white border border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] shadow-xl z-50 text-sm transition-all;
        }
        .help-button:hover .help-tooltip {
            @apply visible opacity-100;
        }
        .gov-table-header {
            @apply bg-gray-50 border-y border-[var(--kr-gov-border-light)] text-[14px] font-bold text-[var(--kr-gov-text-secondary)];
        }
        .status-badge {
            @apply px-2 py-0.5 text-[11px] font-bold rounded-full;
        }
        .page-active {
            @apply bg-[var(--kr-gov-blue)] text-white font-bold;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#00378b",
                        "secondary": "#006b5d",
                        "gov-gray": "#767676",
                    },
                    borderRadius: {
                        'gov': '5px',
                    }
                },
            },
        }
    </script>
</head>

<body class="bg-[#f8f9fa] text-[var(--kr-gov-text-primary)]">
    <a class="skip-link" href="#main-content">본문 바로가기</a>

    <!-- Header fragment inclusion -->
    <div th:replace="~{egovframework/com/admin/header :: headerFragment}"></div>

    <div class="flex min-h-[calc(100vh-124px)]">
        <aside class="js-admin-lnb w-72 bg-white border-r border-[var(--kr-gov-border-light)] p-5 flex flex-col" aria-label="관리자 사이드 메뉴"></aside>

        <main class="flex-1 p-8 overflow-y-auto" id="main-content">
            <nav aria-label="Breadcrumb" class="flex items-center gap-2 text-sm text-[var(--kr-gov-text-secondary)] mb-4">
                <span class="material-symbols-outlined text-[18px]">home</span>
                <span>홈</span>
                <span class="material-symbols-outlined text-[16px]">chevron_right</span>
                <span>회원사</span>
                <span class="material-symbols-outlined text-[16px]">chevron_right</span>
                <span class="font-bold text-[var(--kr-gov-blue)]">회원사 목록 조회</span>
            </nav>
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 class="text-2xl font-black text-[var(--kr-gov-text-primary)]">회원사 목록 조회</h2>
                </div>
            </div>
            <div class="gov-card mb-8">
                <form action="/admin/member/company_list" class="grid grid-cols-1 md:grid-cols-3 gap-6" method="get">
                    <div>
                        <label class="block text-[14px] font-bold text-[var(--kr-gov-text-secondary)] mb-2" for="status">상태</label>
                        <select class="w-full border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] text-sm focus:ring-[var(--kr-gov-focus)] focus:border-[var(--kr-gov-focus)]"
                                id="status" name="sbscrbSttus">
                            <option value="" th:selected="${sbscrbSttus == null or sbscrbSttus == ''}">전체</option>
                            <option value="P" th:selected="${sbscrbSttus == 'P'}">활성</option>
                            <option value="A" th:selected="${sbscrbSttus == 'A'}">승인 대기</option>
                            <option value="R" th:selected="${sbscrbSttus == 'R'}">반려</option>
                            <option value="D" th:selected="${sbscrbSttus == 'D'}">삭제</option>
                            <option value="X" th:selected="${sbscrbSttus == 'X'}">차단</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-[14px] font-bold text-[var(--kr-gov-text-secondary)] mb-2" for="keyword">검색어</label>
                        <div class="flex gap-2">
                            <input class="flex-1 border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] text-sm focus:ring-[var(--kr-gov-focus)] focus:border-[var(--kr-gov-focus)]"
                                   id="keyword" name="searchKeyword" placeholder="기관명, 사업자등록번호 검색" th:value="${searchKeyword}" type="text" />
                            <button class="px-6 py-2 bg-[var(--kr-gov-blue)] text-white font-bold rounded-[var(--kr-gov-radius)] hover:bg-[var(--kr-gov-blue-hover)] transition-colors flex items-center gap-2" type="submit">
                                <span class="material-symbols-outlined text-[18px]">search</span>
                                검색
                            </button>
                        </div>
                    </div>
                </form>
            </div>
            <div class="mb-4 text-sm text-red-600 font-medium" th:if="${company_listError}" th:text="'조회 중 오류: ' + ${company_listError}"></div>
            <div class="flex justify-between items-center mb-4">
                <div class="text-[14px]">
                    전체 <span class="font-bold text-[var(--kr-gov-blue)]" th:text="${#numbers.formatInteger(totalCount, 0, 'COMMA')}">0</span>건
                </div>
                <div class="flex gap-2">
                    <a class="flex items-center gap-1.5 px-3 py-2 bg-white border border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] text-[13px] font-bold hover:bg-gray-50"
                       th:href="@{/admin/member/company_list/excel(searchKeyword=${searchKeyword},sbscrbSttus=${sbscrbSttus})}">
                        <span class="material-symbols-outlined text-[18px]">download</span> 회원사 엑셀 다운로드
                    </a>
                    <a class="flex items-center gap-1.5 px-3 py-2 bg-[var(--kr-gov-green)] text-white rounded-[var(--kr-gov-radius)] text-[13px] font-bold hover:opacity-90"
                       href="/admin/member/company_account">
                        <span class="material-symbols-outlined text-[18px]">person_add</span> 신규 회원사 등록
                    </a>
                </div>
            </div>
            <div class="gov-card p-0 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left border-collapse">
                        <thead>
                            <tr class="gov-table-header">
                                <th class="px-6 py-4 text-center w-16">번호</th>
                                <th class="px-6 py-4">기관명</th>
                                <th class="px-6 py-4">사업자등록번호</th>
                                <th class="px-6 py-4">대표자명</th>
                                <th class="px-6 py-4 text-center">상태</th>
                                <th class="px-6 py-4 text-center">관리</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
                            <tr class="hover:bg-gray-50/50 transition-colors" th:each="company, stat : ${company_list}">
                                <td class="px-6 py-4 text-center text-gray-500"
                                    th:text="${totalCount - ((pageIndex - 1) * pageSize + stat.index)}">1</td>
                                <td class="px-6 py-4 font-bold text-[var(--kr-gov-text-primary)]" th:text="${company.cmpnyNm}">기관명</td>
                                <td class="px-6 py-4 text-gray-500" th:text="${company.bizrno}">000-00-00000</td>
                                <td class="px-6 py-4 text-gray-500" th:text="${company.cxfc}">대표자</td>
                                <td class="px-6 py-4 text-center">
                                    <span class="status-badge bg-emerald-100 text-emerald-700"
                                          th:if="${company.joinStat == 'P'}">활성</span>
                                    <span class="status-badge bg-blue-100 text-blue-700"
                                          th:if="${company.joinStat == 'A'}">승인 대기</span>
                                    <span class="status-badge bg-amber-100 text-amber-700"
                                          th:if="${company.joinStat == 'R'}">반려</span>
                                    <span class="status-badge bg-slate-200 text-slate-700"
                                          th:if="${company.joinStat == 'D'}">삭제</span>
                                    <span class="status-badge bg-red-100 text-red-700"
                                          th:if="${company.joinStat == 'X'}">차단</span>
                                    <span class="status-badge bg-gray-100 text-gray-700"
                                          th:if="${company.joinStat != 'P' and company.joinStat != 'A' and company.joinStat != 'R' and company.joinStat != 'D' and company.joinStat != 'X'}"
                                          th:text="${company.joinStat}">기타</span>
                                </td>
                                <td class="px-6 py-4 text-center space-x-1">
                                    <a class="inline-flex px-3 py-1.5 border border-[var(--kr-gov-border-light)] text-[12px] font-bold rounded-[var(--kr-gov-radius)] hover:bg-gray-100"
                                       th:href="@{/admin/member/company_account(insttId=${company.insttId})}">수정</a>
                                    <a class="inline-flex px-3 py-1.5 bg-[var(--kr-gov-blue)] text-white text-[12px] font-bold rounded-[var(--kr-gov-radius)] hover:bg-[var(--kr-gov-blue-hover)]"
                                       th:href="@{/admin/member/company_detail(insttId=${company.insttId})}">상세</a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(company_list)}">
                                <td class="px-6 py-8 text-center text-gray-500" colspan="6">조회된 회원사가 없습니다.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="px-6 py-4 border-t border-[var(--kr-gov-border-light)] bg-gray-50 flex justify-center">
                    <nav class="flex items-center gap-1">
                        <a class="p-1 rounded hover:bg-white border border-transparent hover:border-gray-200"
                           th:href="@{/admin/member/company_list(pageIndex=1,searchKeyword=${searchKeyword},sbscrbSttus=${sbscrbSttus})}">
                            <span class="material-symbols-outlined">first_page</span>
                        </a>
                        <a class="p-1 rounded hover:bg-white border border-transparent hover:border-gray-200"
                           th:href="@{/admin/member/company_list(pageIndex=${prevPage},searchKeyword=${searchKeyword},sbscrbSttus=${sbscrbSttus})}">
                            <span class="material-symbols-outlined">chevron_left</span>
                        </a>
                        <div class="flex items-center gap-1 mx-4">
                            <a th:each="pageNum : ${#numbers.sequence(startPage, endPage)}"
                               th:href="@{/admin/member/company_list(pageIndex=${pageNum},searchKeyword=${searchKeyword},sbscrbSttus=${sbscrbSttus})}"
                               th:text="${pageNum}"
                               th:classappend="${pageNum == pageIndex} ? 'page-active' : 'hover:bg-white hover:border-gray-200'"
                               class="w-8 h-8 rounded border border-transparent text-sm flex items-center justify-center">1</a>
                        </div>
                        <a class="p-1 rounded hover:bg-white border border-transparent hover:border-gray-200"
                           th:href="@{/admin/member/company_list(pageIndex=${nextPage},searchKeyword=${searchKeyword},sbscrbSttus=${sbscrbSttus})}">
                            <span class="material-symbols-outlined">chevron_right</span>
                        </a>
                        <a class="p-1 rounded hover:bg-white border border-transparent hover:border-gray-200"
                           th:href="@{/admin/member/company_list(pageIndex=${totalPages},searchKeyword=${searchKeyword},sbscrbSttus=${sbscrbSttus})}">
                            <span class="material-symbols-outlined">last_page</span>
                        </a>
                    </nav>
                </div>
            </div>
        </main>
    </div>

    <!-- Footer fragment inclusion -->
    <div th:replace="~{egovframework/com/admin/footer :: footerFragment}"></div>

    <script th:inline="javascript">
        function logout() {
            if (confirm("로그아웃 하시겠습니까?")) {
                fetch('/admin/login/actionLogout', {
                    method: 'POST'
                })
                    .then(response => response.json())
                    .then(response => {
                        if (response.status === 'success') {
                            location.href = '/admin/login/loginView';
                        }
                    });
            }
        }
    </script>
<script src="/js/accessibility.js" defer></script>
</body>

</html>
