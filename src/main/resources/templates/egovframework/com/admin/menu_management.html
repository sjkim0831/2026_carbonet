<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>메뉴 관리 | CCUS 통합관리 시스템</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Public+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style type="text/tailwindcss">
        :root {
            --kr-gov-blue: #00378b;
            --kr-gov-blue-hover: #002d72;
            --kr-gov-text-primary: #1a1a1a;
            --kr-gov-text-secondary: #4d4d4d;
            --kr-gov-border-light: #d9d9d9;
            --kr-gov-focus: #005fde;
            --kr-gov-radius: 5px;
            --kr-gov-error: #c62828;
            --kr-gov-success: #1b5e20;
        }
        @layer base {
            body { font-family: 'Noto Sans KR', 'Public Sans', sans-serif; -webkit-font-smoothing: antialiased; }
            .skip-link { @apply absolute -top-full left-0 bg-[var(--kr-gov-blue)] text-white p-3 z-[100] transition-all focus:top-0 focus:outline-none focus:ring-2 focus:ring-white; }
        }
        .material-symbols-outlined { font-variation-settings: 'wght' 400, 'opsz' 24; font-size: 24px; line-height: 1.6; }
        .gov-card { @apply border border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] bg-white p-6 shadow-sm; }
        .gov-label { @apply block text-[13px] font-bold text-[var(--kr-gov-text-secondary)] mb-2; }
        .gov-input, .gov-select { @apply w-full border border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] h-10 px-3 text-sm focus:ring-2 focus:ring-[var(--kr-gov-focus)] focus:border-[var(--kr-gov-focus)] outline-none; }
        .gov-btn { @apply inline-flex items-center justify-center gap-1.5 px-4 py-2 text-[13px] font-bold rounded-[var(--kr-gov-radius)] transition-colors; }
        .gov-btn-primary { @apply bg-[var(--kr-gov-blue)] text-white hover:bg-[var(--kr-gov-blue-hover)]; }
        .gov-btn-outline { @apply bg-white border border-[var(--kr-gov-border-light)] text-[var(--kr-gov-text-secondary)] hover:bg-gray-50; }
        .gov-tree-list { @apply space-y-3; }
        .gov-tree-children { @apply mt-3 ml-4 md:ml-8 space-y-3 border-l border-dashed border-[var(--kr-gov-border-light)] pl-4; }
        .gov-tree-node { @apply rounded-[var(--kr-gov-radius)] border border-[var(--kr-gov-border-light)] bg-white p-4; }
        .gov-chip { @apply inline-flex items-center gap-1 rounded-full px-2.5 py-1 text-[11px] font-bold; }
    </style>
</head>
<body class="bg-[#f8f9fa] text-[var(--kr-gov-text-primary)]">
<a class="skip-link" href="#main-content">본문 바로가기</a>
<div th:replace="~{egovframework/com/admin/header :: headerFragment}"></div>

<div class="flex min-h-[calc(100vh-124px)]">
    <aside aria-label="관리자 사이드 메뉴" class="js-admin-lnb w-72 bg-white border-r border-[var(--kr-gov-border-light)] p-5 flex flex-col"></aside>

    <main class="flex-1 p-8 overflow-y-auto" id="main-content">
        <nav aria-label="Breadcrumb" class="flex items-center gap-2 text-sm text-[var(--kr-gov-text-secondary)] mb-4">
            <span class="material-symbols-outlined text-[18px]">home</span>
            <span>시스템</span>
            <span class="material-symbols-outlined text-[16px]">chevron_right</span>
            <span>환경</span>
            <span class="material-symbols-outlined text-[16px]">chevron_right</span>
            <span class="font-bold text-[var(--kr-gov-blue)]">메뉴 관리</span>
        </nav>

        <div class="flex items-end justify-between mb-6 gap-4 flex-wrap">
            <div>
                <h2 class="text-2xl font-black">메뉴 관리</h2>
                <p class="text-sm text-[var(--kr-gov-text-secondary)] mt-1">홈과 관리자 메뉴 계층을 같은 기준으로 확인하고, 같은 레벨 안에서 순서를 조정합니다.</p>
            </div>
        </div>

        <div class="mb-4 rounded-[var(--kr-gov-radius)] border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"
             th:if="${menuMgmtError}" th:text="${menuMgmtError}"></div>
        <div class="mb-4 rounded-[var(--kr-gov-radius)] border border-green-200 bg-green-50 px-4 py-3 text-sm text-[var(--kr-gov-success)]"
             th:if="${menuMgmtMessage}" th:text="${menuMgmtMessage}"></div>

        <section class="gov-card mb-6">
            <form method="get" action="/admin/system/menu-management" class="grid grid-cols-1 md:grid-cols-[16rem_1fr] gap-4 items-end">
                <div>
                    <label class="gov-label" for="menuType">화면 구분</label>
                    <select class="gov-select" id="menuType" name="menuType">
                        <option th:each="type : ${menuTypes}"
                                th:value="${type['value']}"
                                th:selected="${menuType == type['value']}"
                                th:text="${type['label']}">관리자</option>
                    </select>
                </div>
                <div class="rounded-[var(--kr-gov-radius)] border border-blue-100 bg-blue-50 px-4 py-3 text-sm text-[var(--kr-gov-text-secondary)]">
                    같은 부모 메뉴 아래에서만 위/아래 이동이 가능합니다. 저장 후 홈 메뉴와 관리자 좌측 메뉴에도 같은 순서가 반영됩니다.
                </div>
            </form>
        </section>

        <section class="gov-card">
            <div class="flex items-center justify-between gap-4 border-b pb-4 mb-4 flex-wrap">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-[var(--kr-gov-blue)]">account_tree</span>
                    <h3 class="text-lg font-bold">메뉴 트리</h3>
                </div>
                <form method="post" action="/admin/system/menu-management/order" id="menuOrderForm" class="flex items-center gap-2">
                    <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" name="menuType" th:value="${menuType}" />
                    <input type="hidden" name="orderPayload" id="orderPayload" />
                    <button class="gov-btn gov-btn-primary" type="submit">순서 저장</button>
                </form>
            </div>

            <div class="mb-4 grid grid-cols-1 md:grid-cols-3 gap-3 text-sm">
                <div class="rounded-[var(--kr-gov-radius)] border border-[var(--kr-gov-border-light)] bg-[#f8fbff] px-4 py-3">
                    <p class="font-bold text-[var(--kr-gov-blue)]">상위 메뉴</p>
                    <p class="text-[var(--kr-gov-text-secondary)]">4자리 코드</p>
                </div>
                <div class="rounded-[var(--kr-gov-radius)] border border-[var(--kr-gov-border-light)] bg-[#fcfbf7] px-4 py-3">
                    <p class="font-bold text-[#8a5a00]">그룹 메뉴</p>
                    <p class="text-[var(--kr-gov-text-secondary)]">6자리 코드</p>
                </div>
                <div class="rounded-[var(--kr-gov-radius)] border border-[var(--kr-gov-border-light)] bg-[#f7fbf8] px-4 py-3">
                    <p class="font-bold text-[#196c2e]">페이지 메뉴</p>
                    <p class="text-[var(--kr-gov-text-secondary)]">8자리 코드</p>
                </div>
            </div>

            <div class="gov-tree-list" id="menuTreeRoot"></div>
        </section>
    </main>
</div>

<div th:replace="~{egovframework/com/admin/footer :: footerFragment}"></div>
<script th:inline="javascript">
    const menuRows = /*[[${menuRows}]]*/ [];
    const menuTypeSelect = document.getElementById("menuType");
    const orderForm = document.getElementById("menuOrderForm");
    const orderPayloadInput = document.getElementById("orderPayload");
    const treeRoot = document.getElementById("menuTreeRoot");

    function safe(value) {
        return value == null ? "" : String(value).trim();
    }

    function labelOf(row) {
        return safe(row.codeNm) || safe(row.codeDc) || safe(row.code);
    }

    function parentCode(code) {
        if (code.length === 8) return code.substring(0, 6);
        if (code.length === 6) return code.substring(0, 4);
        return "";
    }

    function sortValue(value) {
        const parsed = Number(value);
        return Number.isFinite(parsed) && parsed > 0 ? parsed : Number.MAX_SAFE_INTEGER;
    }

    function fallbackCodeSort(code) {
        const normalized = safe(code).toUpperCase();
        if (normalized.length === 4) {
            return Number(normalized.substring(1)) || Number.MAX_SAFE_INTEGER;
        }
        if (normalized.length >= 6) {
            return Number(normalized.substring(normalized.length - 2)) || Number.MAX_SAFE_INTEGER;
        }
        return Number.MAX_SAFE_INTEGER;
    }

    function buildTree(rows) {
        const map = new Map();
        rows.forEach((row) => {
            const code = safe(row.code).toUpperCase();
            if (!code) return;
            map.set(code, {
                code,
                label: labelOf(row),
                url: safe(row.menuUrl),
                icon: safe(row.menuIcon) || "menu",
                useAt: safe(row.useAt) || "Y",
                sortOrdr: row.sortOrdr,
                children: []
            });
        });

        const roots = [];
        map.forEach((node) => {
            const parent = map.get(parentCode(node.code));
            if (parent) {
                parent.children.push(node);
            } else {
                roots.push(node);
            }
        });

        function sortNodes(nodes) {
            nodes.sort((a, b) => {
                const sortDiff = (sortValue(a.sortOrdr) === Number.MAX_SAFE_INTEGER ? fallbackCodeSort(a.code) : sortValue(a.sortOrdr))
                    - (sortValue(b.sortOrdr) === Number.MAX_SAFE_INTEGER ? fallbackCodeSort(b.code) : sortValue(b.sortOrdr));
                if (sortDiff !== 0) return sortDiff;
                return a.code.localeCompare(b.code);
            });
            nodes.forEach((child) => sortNodes(child.children));
        }

        sortNodes(roots);
        return roots;
    }

    let treeData = buildTree(menuRows);

    function moveNode(siblings, index, direction) {
        const nextIndex = index + direction;
        if (nextIndex < 0 || nextIndex >= siblings.length) return;
        const moved = siblings[index];
        siblings[index] = siblings[nextIndex];
        siblings[nextIndex] = moved;
        siblings.forEach((node, order) => {
            node.sortOrdr = order + 1;
        });
        renderTree();
    }

    function renderNodes(nodes, container) {
        const list = document.createElement("ol");
        list.className = "gov-tree-list";

        nodes.forEach((node, index) => {
            const item = document.createElement("li");
            const depth = node.code.length;
            const depthColor = depth === 4 ? "bg-blue-50 text-[var(--kr-gov-blue)]" : (depth === 6 ? "bg-amber-50 text-[#8a5a00]" : "bg-green-50 text-[#196c2e]");
            item.innerHTML =
                '<div class="gov-tree-node">' +
                    '<div class="flex items-start justify-between gap-4 flex-wrap">' +
                        '<div class="min-w-0">' +
                            '<div class="flex items-center gap-2 flex-wrap">' +
                                '<span class="material-symbols-outlined text-[20px] text-[var(--kr-gov-blue)]">' + node.icon + '</span>' +
                                '<strong class="text-base">' + node.label + '</strong>' +
                                '<span class="gov-chip ' + depthColor + '">' + node.code + '</span>' +
                                '<span class="gov-chip ' + (node.useAt === "Y" ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500') + '">' + (node.useAt === "Y" ? '사용' : '미사용') + '</span>' +
                            '</div>' +
                            '<p class="mt-2 text-sm text-[var(--kr-gov-text-secondary)] break-all">' + (node.url || '연결 URL 없음') + '</p>' +
                        '</div>' +
                        '<div class="flex items-center gap-2 shrink-0">' +
                            '<button class="gov-btn gov-btn-outline js-move-up" type="button"' + (index === 0 ? ' disabled' : '') + '>위로</button>' +
                            '<button class="gov-btn gov-btn-outline js-move-down" type="button"' + (index === nodes.length - 1 ? ' disabled' : '') + '>아래로</button>' +
                        '</div>' +
                    '</div>' +
                '</div>';

            item.querySelector(".js-move-up").addEventListener("click", function () {
                moveNode(nodes, index, -1);
            });
            item.querySelector(".js-move-down").addEventListener("click", function () {
                moveNode(nodes, index, 1);
            });

            if (node.children.length) {
                const childrenWrap = document.createElement("div");
                childrenWrap.className = "gov-tree-children";
                renderNodes(node.children, childrenWrap);
                item.appendChild(childrenWrap);
            }
            list.appendChild(item);
        });

        container.innerHTML = "";
        container.appendChild(list);
    }

    function renderTree() {
        renderNodes(treeData, treeRoot);
    }

    function buildPayload() {
        const payload = [];
        function walk(nodes) {
            nodes.forEach((node, index) => {
                payload.push(node.code + ":" + (index + 1));
                walk(node.children);
            });
        }
        walk(treeData);
        return payload.join(",");
    }

    menuTypeSelect.addEventListener("change", function () {
        this.form.submit();
    });

    orderForm.addEventListener("submit", function () {
        orderPayloadInput.value = buildPayload();
    });

    renderTree();
</script>
</body>
</html>
