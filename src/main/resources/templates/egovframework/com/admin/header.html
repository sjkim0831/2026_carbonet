<header th:fragment="headerFragment"
    th:with="isEn=${#strings.startsWith(#httpServletRequest.requestURI, '/en/admin') or (#httpServletRequest.getParameter('language') != null and #httpServletRequest.getParameter('language').equalsIgnoreCase('en'))}"

    <input th:if="${_csrf != null}" type="hidden" id="admin-csrf-token" th:value="${_csrf.token}" />
    <input th:if="${_csrf != null}" type="hidden" id="admin-csrf-header" th:value="${_csrf.headerName}" />

        <div class="max-w-full mx-auto px-6 py-1.5 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <img th:attr="alt=${isEn} ? 'Government Symbol of the Republic of Korea' : '대한민국정부 상징'" alt="대한민국정부 상징" class="h-3.5"
                    onerror="if (this.dataset.fallbackApplied === '1') { this.style.display='none'; return; } this.dataset.fallbackApplied='1'; this.src='/img/egovframework/kr_gov_symbol.svg';"

<script>
    window.addEventListener("DOMContentLoaded", function () {
        function getCurrentLanguage() {
            var path = normalizePath(window.location.pathname || "");
            if (path.indexOf("/en/admin") === 0) {
                return "en";
            }
            var params = new URLSearchParams(window.location.search || "");
            var lang = (params.get("language") || "").toLowerCase();
            if (lang === "en") {
                return "en";
            }
            return (document.documentElement.lang || "").toLowerCase().indexOf("en") === 0 ? "en" : "ko";
        }

        function normalizeUrl(url) {
            var raw = (url || "").trim();
            if (!raw) {
                return "/";
            }
            var parts = raw.split("#");
            var withoutHash = parts[0];
            var qIndex = withoutHash.indexOf("?");
            var path = qIndex >= 0 ? withoutHash.substring(0, qIndex) : withoutHash;
            var query = qIndex >= 0 ? withoutHash.substring(qIndex) : "";
            if (!path) {
                path = "/";
            }
            if (path.length > 1 && path.charAt(path.length - 1) === "/") {
                path = path.slice(0, -1);
            }
            return path + query;
        }

        function getCsrfHeaders() {
            var tokenEl = document.getElementById("admin-csrf-token");
            var headerEl = document.getElementById("admin-csrf-header");
            var headers = {};
            if (tokenEl && headerEl && tokenEl.value && headerEl.value) {
                headers[headerEl.value] = tokenEl.value;
            }
            return headers;
        }

        function pathOnly(url) {
            return normalizeUrl(url).split("?")[0];
        }

        function adminReactRouteToLegacy(url) {
            var normalized = normalizeUrl(url);
            var path = pathOnly(normalized);
            if (path !== "/admin/react-migration" && path !== "/en/admin/react-migration") {
                return normalized;
            }
            var params = new URLSearchParams(normalized.split("?")[1] || "");
            var route = (params.get("route") || "").trim();
            var isEn = path.indexOf("/en/admin") === 0;
            var prefix = isEn ? "/en/admin" : "/admin";
            var routeMap = {
                "member-approve": prefix + "/member/approve",
                "company-approve": prefix + "/member/company-approve",
                "member-edit": prefix + "/member/edit",
                "member-detail": prefix + "/member/detail",
                "password-reset": prefix + "/member/reset_password",
                "member-list": prefix + "/member/list",
                "admin-list": prefix + "/member/admin_list",
                "company-list": prefix + "/member/company_list",
                "company-detail": prefix + "/member/company_detail",
                "company-account": prefix + "/member/company_account",
                "admin-create": prefix + "/member/admin_account",
                "admin-permission": prefix + "/member/admin_account/permissions",
                "auth-group": prefix + "/auth/group",
                "auth-change": prefix + "/member/auth-change",
                "dept-role": prefix + "/member/dept-role-mapping",
                "system-code": prefix + "/system/code",
                "page-management": prefix + "/system/page-management",
                "function-management": prefix + "/system/feature-management",
                "menu-management": prefix + "/system/menu-management",
                "environment-management": prefix + "/system/environment-management",
                "full-stack-management": prefix + "/system/full-stack-management",
                "platform-studio": prefix + "/system/platform-studio",
                "screen-elements-management": prefix + "/system/screen-elements-management",
                "event-management-console": prefix + "/system/event-management-console",
                "function-management-console": prefix + "/system/function-management-console",
                "api-management-console": prefix + "/system/api-management-console",
                "controller-management-console": prefix + "/system/controller-management-console",
                "db-table-management": prefix + "/system/db-table-management",
                "column-management-console": prefix + "/system/column-management-console",
                "automation-studio": prefix + "/system/automation-studio",
                "help-management": prefix + "/system/help-management",
                "sr-workbench": prefix + "/system/sr-workbench",
                "observability": prefix + "/system/observability",
                "codex-request": prefix + "/system/codex-request",
                "ip-whitelist": prefix + "/system/ip_whitelist",
                "security-history": prefix + "/system/security",
                "security-policy": prefix + "/system/security-policy",
                "security-monitoring": prefix + "/system/security-monitoring",
                "blocklist": prefix + "/system/blocklist",
                "security-audit": prefix + "/system/security-audit",
                "scheduler-management": prefix + "/system/scheduler",
                "login-history": prefix + "/member/login_history",
                "admin-home": prefix + "/"
            };
            return routeMap[route] || normalized;
        }

        function legacyAdminPathToReact(path) {
            return adminReactRouteToLegacy(path);
        }

        function isReactManagedAdminPath(pathname) {
            var normalized = pathOnly(pathname || "");
            return [
                "/admin/system/environment-management",
                "/en/admin/system/environment-management",
                "/admin/system/full-stack-management",
                "/en/admin/system/full-stack-management",
                "/admin/system/platform-studio",
                "/en/admin/system/platform-studio",
                "/admin/system/screen-elements-management",
                "/en/admin/system/screen-elements-management",
                "/admin/system/event-management-console",
                "/en/admin/system/event-management-console",
                "/admin/system/function-management-console",
                "/en/admin/system/function-management-console",
                "/admin/system/api-management-console",
                "/en/admin/system/api-management-console",
                "/admin/system/controller-management-console",
                "/en/admin/system/controller-management-console",
                "/admin/system/db-table-management",
                "/en/admin/system/db-table-management",
                "/admin/system/column-management-console",
                "/en/admin/system/column-management-console",
                "/admin/system/automation-studio",
                "/en/admin/system/automation-studio",
                "/admin/system/help-management",
                "/en/admin/system/help-management",
                "/admin/system/sr-workbench",
                "/en/admin/system/sr-workbench",
                "/admin/system/observability",
                "/en/admin/system/observability",
                "/admin/system/codex-request",
                "/en/admin/system/codex-request"
            ].indexOf(normalized) >= 0;
        }

        var defaultDomainMenus = {
            "대시보드": {
                label: "대시보드",
                labelEn: "Dashboard",
                summary: "통합 운영 현황",
                groups: [
                    {

                        titleEn: "Dashboard",
                        icon: "dashboard",
                        links: [
                            { text: "통합 대시보드", tEn: "Dashboard", u: "/admin/", icon: "dashboard" }
                        ]
                    }
                ]
            },
            "회원관리": { label: "회원관리", labelEn: "Member Management", summary: "회원 관리", groups: [] },
            "배출/인증": { label: "배출/인증", labelEn: "Emissions/Certification", summary: "배출 및 인증 관리", groups: [] },
            "거래/정산": { label: "거래/정산", labelEn: "Transactions/Settlement", summary: "거래 및 정산 관리", groups: [] },
            "콘텐츠": {
                label: "콘텐츠",
                labelEn: "Content",
                summary: "콘텐츠 관리",
                groups: [
                    {
                        title: "콘텐츠 운영",
                        titleEn: "Content Operations",
                        icon: "inventory_2",
                        links: [
                            { text: "사이트맵", tEn: "Sitemap", u: "/admin/content/sitemap", icon: "map" }
                        ]
                    }
                ]
            },
            "외부연계": { label: "외부연계", labelEn: "External Integration", summary: "외부 연계 관리", groups: [] },
            "시스템": {
                label: "시스템",
                labelEn: "System",
                summary: "시스템 관리",
                groups: [
                    {
                        title: "환경",
                        titleEn: "Environment",
                        icon: "settings",
                        links: [
                            { text: "코드 관리", tEn: "Code Management", u: "/admin/system/code", icon: "category" },
                            { text: "페이지 관리", tEn: "Page Management", u: "/admin/system/page-management", icon: "web" },
                            { text: "기능 관리", tEn: "Function Management", u: "/admin/system/feature-management", icon: "extension" },
                            { text: "메뉴 관리", tEn: "Menu Management", u: "/admin/system/menu-management", icon: "account_tree" },
                            { text: "메뉴 통합 관리", tEn: "Menu Unified Management", u: "/admin/system/environment-management", icon: "tune" },
                            { text: "풀스택 관리", tEn: "Full-Stack Management", u: "/admin/system/full-stack-management", icon: "hub" },
                            { text: "플랫폼 스튜디오", tEn: "Platform Studio", u: "/admin/system/platform-studio", icon: "dashboard_customize" },
                            { text: "화면 요소 관리", tEn: "Screen Elements", u: "/admin/system/screen-elements-management?focus=surfaces", icon: "crop_landscape" },

        function setupSessionTimer() {
            var timerWrap = document.getElementById("admin-session-timer");
            var timerValue = document.getElementById("admin-session-remaining");
            var refreshBtn = document.getElementById("admin-session-refresh");
            if (!timerWrap || !timerValue || !refreshBtn) {
                return;
            }
            if (window.__adminSessionTimerInterval) {
                window.clearInterval(window.__adminSessionTimerInterval);
            }

            var SESSION_DURATION_MS = 60 * 60 * 1000;
            var WARNING_MS = 5 * 60 * 1000;
            var DANGER_MS = 60 * 1000;
            var storageKey = "adminSessionExpireAt";
            var now = Date.now();
            var expireAt = parseInt(window.sessionStorage.getItem(storageKey) || "", 10);
            if (!expireAt || Number.isNaN(expireAt) || expireAt <= now) {
                expireAt = now + SESSION_DURATION_MS;
                window.sessionStorage.setItem(storageKey, String(expireAt));
            }

            function formatRemaining(ms) {
                var totalSeconds = Math.max(0, Math.floor(ms / 1000));
                var minutes = Math.floor(totalSeconds / 60);
                var seconds = totalSeconds % 60;
                return String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
            }

            function handleExpiry() {
                timerValue.textContent = "00:00";
                timerWrap.classList.remove("session-warning");
                timerWrap.classList.add("session-danger");
                var isEn = getCurrentLanguage() === "en";
                alert(isEn ? "Your session has expired. You will be logged out." : "세션이 만료되어 로그아웃됩니다.");
                logout();
            }

            function tick() {
                var remaining = expireAt - Date.now();
                if (remaining <= 0) {
                    clearInterval(intervalId);
                    handleExpiry();
                    return;
                }
                timerValue.textContent = formatRemaining(remaining);
                timerWrap.classList.toggle("session-warning", remaining <= WARNING_MS && remaining > DANGER_MS);
                timerWrap.classList.toggle("session-danger", remaining <= DANGER_MS);
            }

            refreshBtn.onclick = function () {
                var isEn = getCurrentLanguage() === "en";
                var confirmed = window.confirm(isEn
                    ? "Extend the current session?"
                    : "현재 세션을 연장하시겠습니까?");
                if (!confirmed) {
                    return;
                }
                var refreshUrl = withLanguage("/admin/login/refreshSession");
                var headers = getCsrfHeaders();
                headers["X-Requested-With"] = "XMLHttpRequest";
                fetch(refreshUrl, {
                    method: "POST",
                    credentials: "same-origin",
                    headers: headers
                }).then(function (response) {
                    if (!response.ok) {
                        throw new Error("HTTP " + response.status);
                    }
                    return response.json();
                }).then(function (payload) {
                    if (!payload || payload.status !== "success") {
                        throw new Error("REFRESH_FAILED");
                    }
                    expireAt = Date.now() + (payload.accessExpiresIn || SESSION_DURATION_MS);
                    window.sessionStorage.setItem(storageKey, String(expireAt));
                    tick();
                    window.alert(isEn
                        ? "The session has been extended."
                        : "세션이 연장되었습니다.");
                }).catch(function () {
                    window.alert(isEn
                        ? "Failed to extend the session. You will be redirected to login."
                        : "세션 연장에 실패했습니다. 로그인 화면으로 이동합니다.");
                    logout();
                });
            };

            if (!window.__adminSessionTimerActivityBound) {
                ["click", "keydown"].forEach(function (eventName) {
                    document.addEventListener(eventName, function () {
                        var savedExpireAt = parseInt(window.sessionStorage.getItem(storageKey) || "", 10);
                        if (!savedExpireAt || Number.isNaN(savedExpireAt)) {
                            return;
                        }
                        var remaining = savedExpireAt - Date.now();
                        if (remaining > WARNING_MS) {
                            return;
                        }
                        var nextExpireAt = Date.now() + SESSION_DURATION_MS;
                        window.sessionStorage.setItem(storageKey, String(nextExpireAt));
                    }, { passive: true });
                });
                window.__adminSessionTimerActivityBound = true;
            }

            tick();
            window.__adminSessionTimerInterval = window.setInterval(function () {
                expireAt = parseInt(window.sessionStorage.getItem(storageKey) || String(expireAt), 10);
                tick();
            }, 1000);
        }

                        var show = a.textContent.toLowerCase().indexOf(keyword) !== -1 || title.indexOf(keyword) !== -1;
                        a.style.display = show ? "" : "none";
                        if (show) {
                            visibleCount += 1;
                        }
                    });
                    groupEl.style.display = visibleCount > 0 || keyword === "" ? "" : "none";
                });
            });
        }

        function setActive(domain) {
            var lang = getCurrentLanguage();
            gnbLinks.forEach(function (link) {
                var active = link.getAttribute("data-domain") === domain;
                var domainLabel = link.getAttribute("data-domain") || "";
                link.textContent = translateDomainLabel(domainLabel, lang);
                link.classList.toggle("text-[var(--kr-gov-blue)]", active);
                link.classList.toggle("border-b-4", active);
                link.classList.toggle("border-[var(--kr-gov-blue)]", active);
                link.classList.toggle("text-[var(--kr-gov-text-secondary)]", !active);
                link.classList.toggle("hover:text-[var(--kr-gov-blue)]", !active);
            });
        }

        function applyPathState(pathname, push) {
            var targetUrl = normalizeUrl(pathname || (window.location.pathname + window.location.search) || "/");
            var targetPath = normalizePath(targetUrl);
            var matchedDomain = findDomainByPath(targetPath);
            var domain = matchedDomain || currentDomain || "회원관리";
            currentDomain = domain;
            window.localStorage.setItem("adminGnbDomain", domain);
            if (push) {
                window.history.pushState({ admin: true }, "", targetUrl);
            }
            setActive(domain);
            renderLnb(domain, targetPath);
            updateLocaleSwitchLinks();
            applyLocaleToStaticLinksAndForms(document);
            applyHeaderFooterLocaleText();
            document.title = document.title || "Admin";
            window.scrollTo(0, 0);
        }

        function navigateAdminRoute(pathname, push) {
            var targetUrl = normalizeUrl(pathname);
            if (isReactManagedAdminPath(targetUrl)) {
                window.location.href = targetUrl;
                return;
            }
            var currentUrl = normalizeUrl(window.location.pathname + window.location.search);
            if (targetUrl === currentUrl) {
                applyPathState(targetUrl, false);
                return;
            }
            fetch(targetUrl, {
                method: "GET",
                credentials: "same-origin",
                headers: { "X-Requested-With": "XMLHttpRequest" }
            }).then(function (response) {
                var responseUrl = response.url || targetUrl;
                if ((response.redirected && /\/(en\/)?admin\/login\/loginView/.test(responseUrl)) ||
                    /\/(en\/)?admin\/login\/loginView/.test(responseUrl)) {
                    window.location.href = responseUrl;
                    throw new Error("__LOGIN_REDIRECT__");
                }
                if (!response.ok) {
                    throw new Error("HTTP " + response.status);
                }
                return response.text().then(function (html) {
                    return { html: html, responseUrl: responseUrl };
                });
            }).then(function (payload) {
                var html = payload.html;
                var parser = new DOMParser();
                var doc = parser.parseFromString(html, "text/html");
                var loginForm = doc.querySelector("form[action*='/admin/login/actionLogin'], form[action*='/en/admin/login/actionLogin']");
                if (loginForm) {
                    window.location.href = payload.responseUrl || withLanguage("/admin/login/loginView");
                    return;
                }
                var nextMain = doc.querySelector("#main-content");
                var currentMain = document.querySelector("#main-content");
                if (!nextMain || !currentMain) {
                    loadDashboardFallback(targetUrl, push);
                    return;
                }
                syncPageHeadStyles(doc);
                currentMain.className = nextMain.className;
                currentMain.innerHTML = nextMain.innerHTML;
                syncDynamicPageScripts(doc);
                if (doc.title) {
                    document.title = doc.title;
                }
                applyPathState(targetUrl, push);
            }).catch(function () {
                if (arguments[0] && arguments[0].message === "__LOGIN_REDIRECT__") {
                    return;
                }
                loadDashboardFallback(targetUrl, push);
            });
        }

        function loadDashboardFallback(targetPath, push) {
            fetch(withLanguage("/admin"), {
                method: "GET",
                credentials: "same-origin",
                headers: { "X-Requested-With": "XMLHttpRequest" }
            }).then(function (response) {
                var responseUrl = response.url || withLanguage("/admin");
                if ((response.redirected && /\/(en\/)?admin\/login\/loginView/.test(responseUrl)) ||
                    /\/(en\/)?admin\/login\/loginView/.test(responseUrl)) {
                    window.location.href = responseUrl;
                    throw new Error("__LOGIN_REDIRECT__");
                }
                if (!response.ok) {
                    throw new Error("HTTP " + response.status);
                }
                return response.text().then(function (html) {
                    return { html: html, responseUrl: responseUrl };
                });
            }).then(function (payload) {
                var html = payload.html;
                var parser = new DOMParser();
                var doc = parser.parseFromString(html, "text/html");
                var loginForm = doc.querySelector("form[action*='/admin/login/actionLogin'], form[action*='/en/admin/login/actionLogin']");
                if (loginForm) {
                    window.location.href = payload.responseUrl || withLanguage("/admin/login/loginView");
                    return;
                }
                var nextMain = doc.querySelector("#main-content");
                var currentMain = document.querySelector("#main-content");
                if (!nextMain || !currentMain) {
                    window.location.href = withLanguage("/admin");
                    return;
                }
                syncPageHeadStyles(doc);
                currentMain.className = nextMain.className;
                currentMain.innerHTML = nextMain.innerHTML;
                syncDynamicPageScripts(doc);
                if (doc.title) {
                    document.title = doc.title;
                }
                applyPathState(targetPath, push);
            }).catch(function () {
                if (arguments[0] && arguments[0].message === "__LOGIN_REDIRECT__") {
                    return;
                }
                window.location.href = withLanguage("/admin");
            });
        }

        function syncPageHeadStyles(doc) {
            var head = document.head;
            Array.prototype.forEach.call(
                head.querySelectorAll("[data-admin-dynamic-head='true']"),
                function (el) { el.remove(); }
            );

            Array.prototype.forEach.call(
                doc.head.querySelectorAll("link[rel='stylesheet']"),
                function (linkEl) {
                    var href = (linkEl.getAttribute("href") || "").trim();
                    if (!href) {
                        return;
                    }
                    if (/^https?:\/\/fonts\.googleapis\.com/i.test(href)) {
                        return;
                    }
                    if (/^https?:\/\//i.test(href) && href.indexOf(window.location.origin) !== 0) {
                        return;
                    }
                    var linkClone = document.createElement("link");
                    Array.prototype.forEach.call(linkEl.attributes, function (attr) {
                        if (attr) {
                            linkClone.setAttribute(attr.name, attr.value);
                        }
                    });
                    linkClone.setAttribute("data-admin-dynamic-head", "true");
                    head.appendChild(linkClone);
                }
            );

            var nextStyle = doc.head.querySelector("style[type='text/tailwindcss']");
            if (nextStyle) {
                var styleClone = document.createElement("style");
                styleClone.setAttribute("type", "text/tailwindcss");
                styleClone.setAttribute("data-admin-dynamic-head", "true");
                styleClone.textContent = nextStyle.textContent || "";
                head.appendChild(styleClone);
            }

            var nextConfig = doc.head.querySelector("script#tailwind-config");
            if (nextConfig) {
                var configClone = document.createElement("script");
                configClone.setAttribute("id", "tailwind-config");
                configClone.setAttribute("data-admin-dynamic-head", "true");
                configClone.textContent = nextConfig.textContent || "";
                head.appendChild(configClone);
            }
        }

        function syncDynamicPageScripts(doc) {
            Array.prototype.forEach.call(
                document.querySelectorAll("[data-admin-dynamic-script='true']"),
                function (el) { el.remove(); }
            );

            Array.prototype.forEach.call(
                doc.querySelectorAll("script[data-admin-page-script='true']"),
                function (scriptEl) {
                    var nextScript = document.createElement("script");
                    Array.prototype.forEach.call(scriptEl.attributes, function (attr) {
                        if (attr && attr.name !== "data-admin-page-script") {
                            nextScript.setAttribute(attr.name, attr.value);
                        }
                    });
                    nextScript.setAttribute("data-admin-dynamic-script", "true");
                    if (scriptEl.src) {
                        nextScript.src = scriptEl.src;
                    } else {
                        nextScript.textContent = scriptEl.textContent || "";
                    }
                    document.body.appendChild(nextScript);
                }
            );
        }

        var savedDomain = window.localStorage.getItem("adminGnbDomain");
        var pathDomain = findDomainByPath((window.location.pathname + window.location.search) || "");
        var currentDomain = pathDomain || (domainMenus[savedDomain] ? savedDomain : "회원관리");
        if (pathDomain) {
            window.localStorage.setItem("adminGnbDomain", pathDomain);
        }
        setActive(currentDomain);
        renderLnb(currentDomain);
        syncGnbMenuOrder();
        updateLocaleSwitchLinks();
        applyLocaleToStaticLinksAndForms(document);
        applyHeaderFooterLocaleText();
        setupSessionTimer();

        function applyMenuData(data) {
            var normalizedMenus = mergeDefaultMenus(normalizeFetchedDomainMenus(data));
            if (!Object.keys(normalizedMenus).length) {
                return;
            }
            domainMenus = normalizedMenus;
            var pathDomain = findDomainByPath((window.location.pathname + window.location.search) || "");
            var savedDomain = window.localStorage.getItem("adminGnbDomain");
            var fallbackDomain = Object.keys(domainMenus)[0] || "회원관리";
            currentDomain = pathDomain || (domainMenus[savedDomain] ? savedDomain : fallbackDomain);
            if (pathDomain) {
                window.localStorage.setItem("adminGnbDomain", pathDomain);
            }
            syncGnbMenuOrder();
            setActive(currentDomain);
            renderLnb(currentDomain);
            applyLocaleToStaticLinksAndForms(document);
            setupSessionTimer();
        }

        fetch(withLanguage("/admin/system/menu-data"), {
            method: "GET",
            credentials: "same-origin",
            headers: { "X-Requested-With": "XMLHttpRequest" }
        }).then(function (response) {
            if (!response.ok) {
                return null;
            }
            return response.json();
        }).then(function (payload) {
            if (payload) {
                applyMenuData(payload);
            }
        }).catch(function () {});

        lnb.addEventListener("click", function (e) {
            var target = e.target;
            if (!(target instanceof Element)) {
                return;
            }
            var link = target.closest("a.admin-sidebar-link");
            if (!(link instanceof HTMLAnchorElement)) {
                return;
            }
            var href = link.getAttribute("href") || "";
            if (!href || href === "#" || link.target === "_blank" || link.hasAttribute("download")) {
                return;
            }
            if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) {
                return;
            }
            var nextUrl = new URL(link.href, window.location.origin);
            if (nextUrl.origin !== window.location.origin) {
                return;
            }
            if (!/^\/(en\/)?admin\//.test(nextUrl.pathname)) {
                return;
            }
            e.preventDefault();
            navigateAdminRoute(nextUrl.pathname + nextUrl.search, true);
        });

        gnbLinks.forEach(function (link) {
            link.addEventListener("click", function (e) {
                var domain = link.getAttribute("data-domain");
                if (!domainMenus[domain]) {
                    return;
                }
                e.preventDefault();
                window.localStorage.setItem("adminGnbDomain", domain);
                setActive(domain);
                renderLnb(domain);
            });
        });
    });
</script>

</header>

</html>
