<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>신규 회원 등록 | CCUS 통합관리 시스템</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&amp;family=Public+Sans:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        :root {
            --kr-gov-blue: #00378b;
            --kr-gov-blue-hover: #002d72;
            --kr-gov-green: #006b5d;
            --kr-gov-text-primary: #1a1a1a;
            --kr-gov-text-secondary: #4d4d4d;
            --kr-gov-border-light: #d9d9d9;
            --kr-gov-focus: #005fde;
            --kr-gov-bg-gray: #f2f2f2;
            --kr-gov-radius: 5px;
            --kr-gov-error: #d32f2f;
        }
        @layer base {
            body { font-family: 'Noto Sans KR', 'Public Sans', sans-serif; -webkit-font-smoothing: antialiased; }
            .skip-link {
                @apply absolute -top-full left-0 bg-[var(--kr-gov-blue)] text-white p-3 z-[100] transition-all focus:top-0 focus:outline-none focus:ring-2 focus:ring-white;
            }
        }
        .material-symbols-outlined {
            font-variation-settings: 'wght' 400, 'opsz' 24;
            font-size: 24px;
            line-height: 1.6;
        }
        .admin-sidebar-link {
            @apply flex items-center gap-3 px-4 py-3 text-[15px] font-medium text-[var(--kr-gov-text-secondary)] hover:bg-gray-100 rounded-[var(--kr-gov-radius)] transition-colors;
        }
        .admin-sidebar-link.active {
            @apply bg-[var(--kr-gov-blue)] text-white font-bold;
        }
        .sidebar-sub-link {
            @apply flex items-center gap-2 pl-12 pr-4 py-2.5 text-[14px] font-medium text-[var(--kr-gov-text-secondary)] hover:text-[var(--kr-gov-blue)] transition-colors relative;
        }
        .sidebar-sub-link.active {
            @apply text-[var(--kr-gov-blue)] font-bold;
        }
        .sidebar-sub-link.active::before {
            content: '';
            @apply absolute left-8 top-1/2 -translate-y-1/2 w-1.5 h-1.5 bg-[var(--kr-gov-blue)] rounded-full;
        }
        .gov-card {
            @apply border border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] bg-white p-8 shadow-sm;
        }
        .form-label {
            @apply block text-[15px] font-bold text-[var(--kr-gov-text-primary)] mb-2 flex items-center gap-1;
        }
        .form-label .required {
            @apply text-[var(--kr-gov-error)] font-black;
        }
        .gov-input {
            @apply w-full border border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] px-4 py-2.5 text-[15px] focus:ring-2 focus:ring-[var(--kr-gov-focus)] focus:border-[var(--kr-gov-focus)] outline-none transition-all placeholder:text-gray-400;
        }
        .gov-select {
            @apply w-full border border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] px-4 py-2.5 text-[15px] focus:ring-2 focus:ring-[var(--kr-gov-focus)] focus:border-[var(--kr-gov-focus)] outline-none transition-all appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%3D%222000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%234d4d4d%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E')] bg-no-repeat bg-[right_1rem_center] bg-[length:1.2rem_1.2rem];
        }
        .validation-msg {
            @apply text-[12px] mt-1.5 hidden;
        }
        .validation-msg.error { @apply text-[var(--kr-gov-error)] block; }
        .validation-msg.success { @apply text-green-600 block; }
    </style>
</head>
<body class="bg-[#f8f9fa] text-[var(--kr-gov-text-primary)]">
<a class="skip-link" href="#main-content">본문 바로가기</a>
<div th:replace="~{egovframework/com/admin/header :: headerFragment}"></div>
<div class="flex min-h-[calc(100vh-124px)]">
<aside aria-label="관리자 사이드 메뉴" class="js-admin-lnb w-72 bg-white border-r border-[var(--kr-gov-border-light)] p-5 flex flex-col"></aside>
<main class="flex-1 p-8 overflow-y-auto" id="main-content">
<nav aria-label="Breadcrumb" class="flex items-center gap-2 text-sm text-[var(--kr-gov-text-secondary)] mb-4">
<span class="material-symbols-outlined text-[18px]">home</span>
<span>홈</span>
<span class="material-symbols-outlined text-[16px]">chevron_right</span>
<span>회원·권한 관리</span>
<span class="material-symbols-outlined text-[16px]">chevron_right</span>
<span class="font-bold text-[var(--kr-gov-blue)]">신규 회원 등록</span>
</nav>
<div class="flex justify-between items-end mb-8 border-b border-[var(--kr-gov-border-light)] pb-6">
<div>
<h2 class="text-2xl font-black text-[var(--kr-gov-text-primary)] tracking-tight">신규 회원 등록</h2>
<p class="text-[var(--kr-gov-text-secondary)] text-sm mt-1">시스템 사용을 위한 신규 사용자를 직접 등록합니다.</p>
</div>
</div>
<form>
<div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
<section class="gov-card">
<h3 class="text-lg font-bold mb-6 flex items-center gap-2 text-[var(--kr-gov-blue)]">
<span class="material-symbols-outlined">account_circle</span>
                        기본 정보
                    </h3>
<div class="space-y-6">
<div>
<label class="form-label" for="user-name">성명 <span class="required">*</span></label>
<input class="gov-input" id="user-name" placeholder="실명을 입력하세요" required="" type="text"/>
</div>
<div>
<label class="form-label" for="user-id">아이디 <span class="required">*</span></label>
<div class="flex gap-2">
<input class="gov-input flex-1" id="user-id" placeholder="6~12자 영문, 숫자 조합" required="" type="text"/>
<button class="px-4 py-2 border border-[var(--kr-gov-blue)] text-[var(--kr-gov-blue)] font-bold rounded-[var(--kr-gov-radius)] hover:bg-blue-50 whitespace-nowrap text-sm" type="button">중복 확인</button>
</div>
<p class="validation-msg success">사용 가능한 아이디입니다.</p>
</div>
<div class="grid grid-cols-2 gap-4">
<div>
<label class="form-label" for="user-email">이메일 <span class="required">*</span></label>
<input class="gov-input" id="user-email" placeholder="example@domain.com" required="" type="email"/>
</div>
<div>
<label class="form-label" for="user-phone">연락처 <span class="required">*</span></label>
<input class="gov-input" id="user-phone" placeholder="010-0000-0000" required="" type="tel"/>
</div>
</div>
<div>
<label class="form-label" for="user-type">회원 유형 <span class="required">*</span></label>
<select class="gov-select" id="user-type" required="">
<option disabled="" selected="" value="">선택하세요</option>
<option value="enterprise">기업 (배출사업자)</option>
<option value="center">진흥센터</option>
<option value="authority">주무관청</option>
</select>
</div>
</div>
</section>
<section class="gov-card">
<h3 class="text-lg font-bold mb-6 flex items-center gap-2 text-[var(--kr-gov-blue)]">
<span class="material-symbols-outlined">badge</span>
                        소속 및 권한 정보
                    </h3>
<div class="space-y-6">
<div>
<label class="form-label" for="org-name">소속 기관/기업명 <span class="required">*</span></label>
<div class="flex gap-2">
<input class="gov-input flex-1" id="org-name" placeholder="기관명 또는 기업명을 검색하세요" readonly="" required="" type="text"/>
<button class="px-4 py-2 bg-gray-800 text-white font-bold rounded-[var(--kr-gov-radius)] hover:bg-gray-700 whitespace-nowrap text-sm flex items-center gap-1" type="button">
<span class="material-symbols-outlined text-[18px]">search</span> 기관 검색
                                </button>
</div>
</div>
<div>
<label class="form-label" for="dept-title">부서 / 직함 <span class="required">*</span></label>
<div class="grid grid-cols-2 gap-4">
<input class="gov-input" id="dept" placeholder="부서명" required="" type="text"/>
<input class="gov-input" id="title" placeholder="직함" required="" type="text"/>
</div>
</div>
<div>
<label class="form-label">시스템 접근 권한 설정 <span class="required">*</span></label>
<div class="border border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] p-4 bg-gray-50">
<p class="text-[12px] text-gray-500 mb-3">사용자에게 부여할 권한을 복수 선택할 수 있습니다.</p>
<div class="grid grid-cols-2 gap-3">
<label class="flex items-center gap-3 p-3 bg-white border border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] cursor-pointer hover:border-[var(--kr-gov-blue)] transition-colors">
<input class="w-5 h-5 text-[var(--kr-gov-blue)] border-gray-300 rounded focus:ring-[var(--kr-gov-blue)]" type="checkbox"/>
<span class="text-sm font-medium">데이터 조회 권한</span>
</label>
<label class="flex items-center gap-3 p-3 bg-white border border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] cursor-pointer hover:border-[var(--kr-gov-blue)] transition-colors">
<input class="w-5 h-5 text-[var(--kr-gov-blue)] border-gray-300 rounded focus:ring-[var(--kr-gov-blue)]" type="checkbox"/>
<span class="text-sm font-medium">데이터 입력/수정 권한</span>
</label>
<label class="flex items-center gap-3 p-3 bg-white border border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] cursor-pointer hover:border-[var(--kr-gov-blue)] transition-colors">
<input class="w-5 h-5 text-[var(--kr-gov-blue)] border-gray-300 rounded focus:ring-[var(--kr-gov-blue)]" type="checkbox"/>
<span class="text-sm font-medium">인증 심사 권한</span>
</label>
<label class="flex items-center gap-3 p-3 bg-white border border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] cursor-pointer hover:border-[var(--kr-gov-blue)] transition-colors">
<input class="w-5 h-5 text-[var(--kr-gov-blue)] border-gray-300 rounded focus:ring-[var(--kr-gov-blue)]" type="checkbox"/>
<span class="text-sm font-medium">통계 리포트 다운로드</span>
</label>
</div>
</div>
</div>
</div>
</section>
</div>
<div class="mt-12 flex justify-center gap-4 border-t border-[var(--kr-gov-border-light)] pt-10">
<button class="px-10 py-3.5 border border-[var(--kr-gov-border-light)] bg-white text-[var(--kr-gov-text-secondary)] font-bold rounded-[var(--kr-gov-radius)] hover:bg-gray-50 transition-colors text-[16px]" type="button">
                    취소
                </button>
<button class="px-10 py-3.5 bg-[var(--kr-gov-blue)] text-white font-bold rounded-[var(--kr-gov-radius)] hover:bg-[var(--kr-gov-blue-hover)] transition-colors text-[16px] shadow-lg shadow-blue-900/10" type="submit">
                    등록 완료
                </button>
</div>
</form>
</main>
</div>
<div th:replace="~{egovframework/com/admin/footer :: footerFragment}"></div>

<script src="/js/accessibility.js" defer></script>
</body></html>
