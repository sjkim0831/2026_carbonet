<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>차단 대상 관리 | CCUS 통합관리 시스템</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Public+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style type="text/tailwindcss">
        :root { --kr-gov-blue:#00378b; --kr-gov-blue-hover:#002d72; --kr-gov-border-light:#d9d9d9; --kr-gov-text-primary:#1a1a1a; --kr-gov-text-secondary:#4d4d4d; --kr-gov-focus:#005fde; --kr-gov-bg-gray:#f2f2f2; --kr-gov-radius:5px; }
        @layer base { body { font-family:'Noto Sans KR','Public Sans',sans-serif; -webkit-font-smoothing:antialiased; } }
        .material-symbols-outlined { font-variation-settings: 'wght' 400, 'opsz' 24; font-size: 24px; line-height: 1.6; }
        .admin-sidebar-link { @apply flex items-center gap-3 px-4 py-3 text-[15px] font-medium text-[var(--kr-gov-text-secondary)] hover:bg-gray-100 rounded-[var(--kr-gov-radius)] transition-colors; }
        .admin-sidebar-link.active { @apply bg-[var(--kr-gov-blue)] text-white font-bold; }
        .admin-sidebar-sublink { @apply flex items-center gap-2 pl-12 pr-4 py-2 text-[14px] text-[var(--kr-gov-text-secondary)] hover:text-[var(--kr-gov-blue)] hover:font-bold transition-all; }
        .admin-sidebar-sublink.active { @apply text-[var(--kr-gov-blue)] font-bold relative; }
        .admin-sidebar-sublink.active::before { content:''; @apply absolute left-8 w-1.5 h-1.5 bg-[var(--kr-gov-blue)] rounded-full top-1/2 -translate-y-1/2; }
        .gov-card { @apply border border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] bg-white p-6 shadow-sm; }
        .gov-table-header { @apply bg-gray-50 border-y border-[var(--kr-gov-border-light)] text-[13px] font-bold text-[var(--kr-gov-text-secondary)]; }
    </style>
</head>
<body class="bg-[#f8f9fa] text-[var(--kr-gov-text-primary)]">
<div th:replace="~{egovframework/com/admin/header :: headerFragment}"></div>
<div class="flex min-h-[calc(100vh-124px)]">
    <aside class="js-admin-lnb w-72 bg-white border-r border-[var(--kr-gov-border-light)] p-5 flex flex-col"></aside>
    <main class="flex-1 p-8 overflow-y-auto">
        <div class="mb-6"><h2 class="text-2xl font-black">차단 대상 관리</h2><p class="mt-1 text-sm text-[var(--kr-gov-text-secondary)]">IP, CIDR, 계정, User-Agent 단위 차단 대상을 운영하고 해제 대기열을 점검합니다.</p></div>
        <section class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 mb-6"><article class="gov-card" th:each="card : ${blocklistSummary}"><p class="text-xs font-bold text-[var(--kr-gov-text-secondary)]" th:text="${card['title']}">활성 차단</p><p class="mt-3 text-2xl font-black" th:text="${card['value']}">27</p><p class="mt-2 text-sm text-[var(--kr-gov-text-secondary)]" th:text="${card['description']}">설명</p></article></section>
        <section class="gov-card mb-6 p-0 overflow-hidden"><div class="px-6 py-5 border-b border-[var(--kr-gov-border-light)]"><h3 class="text-lg font-bold">차단 정책 적용 대상</h3></div><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="gov-table-header"><th class="px-4 py-3">차단 ID</th><th class="px-4 py-3">대상</th><th class="px-4 py-3">유형</th><th class="px-4 py-3">사유</th><th class="px-4 py-3">상태</th><th class="px-4 py-3">만료</th><th class="px-4 py-3">등록 주체</th></tr></thead><tbody class="divide-y divide-gray-100"><tr th:each="row : ${blocklistRows}"><td class="px-4 py-3 font-bold" th:text="${row['blockId']}">BL-1</td><td class="px-4 py-3 font-mono" th:text="${row['target']}">198.51.100.42</td><td class="px-4 py-3" th:text="${row['blockType']}">IP</td><td class="px-4 py-3" th:text="${row['reason']}">관리자 로그인 버스트</td><td class="px-4 py-3" th:text="${row['status']}">ACTIVE</td><td class="px-4 py-3" th:text="${row['expiresAt']}">2026-03-12 10:00</td><td class="px-4 py-3" th:text="${row['owner']}">자동 룰</td></tr></tbody></table></div></section>
        <section class="gov-card"><h3 class="text-lg font-bold mb-4">해제 대기열</h3><div class="space-y-3" th:each="row : ${blocklistReleaseQueue}"><div class="rounded-lg border border-[var(--kr-gov-border-light)] p-4"><div class="flex items-center justify-between gap-3"><strong class="font-mono" th:text="${row['target']}">198.51.100.42</strong><span class="text-sm" th:text="${row['releaseAt']}">2026-03-12 10:00</span></div><p class="mt-2 text-sm text-[var(--kr-gov-text-secondary)]" th:text="${row['condition']}">조건</p></div></div></section>
    </main>
</div>
<div th:replace="~{egovframework/com/admin/footer :: footerFragment}"></div>
</body>
</html>
