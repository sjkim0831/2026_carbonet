<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>코드 관리 | CCUS 통합관리 시스템</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Public+Sans:wght@400;600;700&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <style type="text/tailwindcss">
        :root {
            --kr-gov-blue: #00378b;
            --kr-gov-blue-hover: #002d72;
            --kr-gov-green: #006b5d;
            --kr-gov-text-primary: #1a1a1a;
            --kr-gov-text-secondary: #4d4d4d;
            --kr-gov-border-light: #d9d9d9;
            --kr-gov-focus: #005fde;
            --kr-gov-bg-gray: #f2f2f2;
            --kr-gov-radius: 5px;
            --kr-gov-error: #c62828;
        }

        @layer base {
            body { font-family: 'Noto Sans KR', 'Public Sans', sans-serif; -webkit-font-smoothing: antialiased; }
            .skip-link {
                @apply absolute -top-full left-0 bg-[var(--kr-gov-blue)] text-white p-3 z-[100] transition-all focus:top-0 focus:outline-none focus:ring-2 focus:ring-white;
            }
        }

        .material-symbols-outlined { font-variation-settings: 'wght' 400, 'opsz' 24; font-size: 24px; line-height: 1.6; }
        .gov-card { @apply border border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] bg-white p-6 shadow-sm; }
        .gov-label { @apply block text-[13px] font-bold text-[var(--kr-gov-text-secondary)] mb-2; }
        .gov-input, .gov-select { @apply w-full border border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] h-10 px-3 text-sm focus:ring-2 focus:ring-[var(--kr-gov-focus)] focus:border-[var(--kr-gov-focus)] outline-none; }
        .gov-btn { @apply inline-flex items-center justify-center gap-1.5 px-4 py-2 text-[13px] font-bold rounded-[var(--kr-gov-radius)] transition-colors; }
        .gov-btn-primary { @apply bg-[var(--kr-gov-blue)] text-white hover:bg-[var(--kr-gov-blue-hover)]; }
        .gov-btn-outline { @apply bg-white border border-[var(--kr-gov-border-light)] text-[var(--kr-gov-text-secondary)] hover:bg-gray-50; }
        .gov-btn-danger { @apply bg-red-600 text-white hover:bg-red-700; }
        .gov-table-header { @apply bg-gray-50 border-y border-[var(--kr-gov-border-light)] text-[13px] font-bold text-[var(--kr-gov-text-secondary)]; }
    </style>
</head>

<body class="bg-[#f8f9fa] text-[var(--kr-gov-text-primary)]">
    <a class="skip-link" href="#main-content">본문 바로가기</a>

    <div th:replace="~{egovframework/com/admin/header :: headerFragment}"></div>

    <div class="flex min-h-[calc(100vh-124px)]">
        <aside class="js-admin-lnb w-72 bg-white border-r border-[var(--kr-gov-border-light)] p-5 flex flex-col" aria-label="관리자 사이드 메뉴"></aside>

        <main class="flex-1 p-8 overflow-y-auto" id="main-content">
            <nav aria-label="Breadcrumb" class="flex items-center gap-2 text-sm text-[var(--kr-gov-text-secondary)] mb-4">
                <span class="material-symbols-outlined text-[18px]">home</span>
                <span>시스템</span>
                <span class="material-symbols-outlined text-[16px]">chevron_right</span>
                <span class="font-bold text-[var(--kr-gov-blue)]">코드 관리</span>
            </nav>

            <div class="flex items-end justify-between mb-6">
                <div>
                    <h2 class="text-2xl font-black text-[var(--kr-gov-text-primary)]">코드 관리</h2>
                    <p class="text-sm text-[var(--kr-gov-text-secondary)] mt-1">공통 분류 코드, 코드 ID, 상세 코드를 등록/수정/삭제합니다.</p>
                </div>
            </div>

            <div class="mb-4 rounded-[var(--kr-gov-radius)] border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"
                 th:if="${codeMgmtError}" th:text="${codeMgmtError}"></div>

            <section class="gov-card mb-8">
                <div class="flex items-center gap-2 border-b pb-4 mb-4">
                    <span class="material-symbols-outlined text-[var(--kr-gov-blue)]">category</span>
                    <h3 class="text-lg font-bold">분류 코드</h3>
                </div>
                <form method="post" action="/admin/system/code/class/create" class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-4">
                    <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div>
                        <label class="gov-label" for="clCode">분류 코드</label>
                        <input class="gov-input" id="clCode" name="clCode" placeholder="예: HME" type="text" />
                    </div>
                    <div class="md:col-span-2">
                        <label class="gov-label" for="clCodeNm">분류명</label>
                        <input class="gov-input" id="clCodeNm" name="clCodeNm" placeholder="예: 홈 메뉴" type="text" />
                    </div>
                    <div>
                        <label class="gov-label" for="clCodeDc">설명</label>
                        <input class="gov-input" id="clCodeDc" name="clCodeDc" placeholder="분류 설명" type="text" />
                    </div>
                    <div>
                        <label class="gov-label" for="clUseAt">사용여부</label>
                        <select class="gov-select" id="clUseAt" name="useAt">
                            <option value="Y">Y</option>
                            <option value="N">N</option>
                        </select>
                    </div>
                    <div class="md:col-span-5 flex justify-end gap-2">
                        <button class="gov-btn gov-btn-primary" type="submit">분류 코드 추가</button>
                    </div>
                </form>

                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left border-collapse">
                        <thead>
                            <tr class="gov-table-header">
                                <th class="px-4 py-3">분류 코드</th>
                                <th class="px-4 py-3">분류명</th>
                                <th class="px-4 py-3">설명(영문)</th>
                                <th class="px-4 py-3 text-center">사용</th>
                                <th class="px-4 py-3 text-center">관리</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
                            <tr th:each="row : ${clCodeList}">
                                <td class="px-4 py-3 font-bold" th:text="${row.clCode}">CL</td>
                                <td class="px-4 py-3">
                                    <form method="post" action="/admin/system/code/class/update" class="grid grid-cols-1 md:grid-cols-4 gap-2 items-center">
                                        <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <input type="hidden" name="clCode" th:value="${row.clCode}" />
                                        <input class="gov-input" name="clCodeNm" th:value="${row.clCodeNm}" />
                                        <input class="gov-input" name="clCodeDc" th:value="${row.clCodeDc}" />
                                        <select class="gov-select" name="useAt">
                                            <option value="Y" th:selected="${row.useAt == 'Y'}">Y</option>
                                            <option value="N" th:selected="${row.useAt == 'N'}">N</option>
                                        </select>
                                        <div class="flex gap-2 justify-end md:col-span-1">
                                            <button class="gov-btn gov-btn-outline" type="submit">수정</button>
                                        </div>
                                    </form>
                                </td>
                                <td class="px-4 py-3 text-gray-500" th:text="${row.clCodeDc}">-</td>
                                <td class="px-4 py-3 text-center" th:text="${row.useAt}">Y</td>
                                <td class="px-4 py-3 text-center">
                                    <form method="post" action="/admin/system/code/class/delete">
                                        <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <input type="hidden" name="clCode" th:value="${row.clCode}" />
                                        <button class="gov-btn gov-btn-danger" type="submit">삭제</button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(clCodeList)}">
                                <td class="px-4 py-6 text-center text-gray-500" colspan="5">분류 코드가 없습니다.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <section class="gov-card mb-8">
                <div class="flex items-center gap-2 border-b pb-4 mb-4">
                    <span class="material-symbols-outlined text-[var(--kr-gov-blue)]">list_alt</span>
                    <h3 class="text-lg font-bold">코드 ID</h3>
                </div>
                <form method="post" action="/admin/system/code/group/create" class="grid grid-cols-1 md:grid-cols-6 gap-4 mb-4">
                    <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div>
                        <label class="gov-label" for="codeId">코드 ID</label>
                        <input class="gov-input" id="codeId" name="codeId" placeholder="예: HMENU1" type="text" />
                    </div>
                    <div class="md:col-span-2">
                        <label class="gov-label" for="codeIdNm">코드명</label>
                        <input class="gov-input" id="codeIdNm" name="codeIdNm" placeholder="예: 홈 메뉴" type="text" />
                    </div>
                    <div>
                        <label class="gov-label" for="codeIdDc">설명(영문)</label>
                        <input class="gov-input" id="codeIdDc" name="codeIdDc" placeholder="영문명/설명" type="text" />
                    </div>
                    <div>
                        <label class="gov-label" for="codeCl">분류 코드</label>
                        <select class="gov-select" id="codeCl" name="clCode">
                            <option th:each="cl : ${clCodeList}" th:value="${cl.clCode}" th:text="${cl.clCode + ' - ' + cl.clCodeNm}">분류</option>
                        </select>
                    </div>
                    <div>
                        <label class="gov-label" for="codeUseAt">사용여부</label>
                        <select class="gov-select" id="codeUseAt" name="useAt">
                            <option value="Y">Y</option>
                            <option value="N">N</option>
                        </select>
                    </div>
                    <div class="md:col-span-6 flex justify-end gap-2">
                        <button class="gov-btn gov-btn-primary" type="submit">코드 ID 추가</button>
                    </div>
                </form>

                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left border-collapse">
                        <thead>
                            <tr class="gov-table-header">
                                <th class="px-4 py-3">코드 ID</th>
                                <th class="px-4 py-3">코드명</th>
                                <th class="px-4 py-3">설명(영문)</th>
                                <th class="px-4 py-3">분류</th>
                                <th class="px-4 py-3 text-center">사용</th>
                                <th class="px-4 py-3 text-center">관리</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
                            <tr th:each="row : ${codeList}">
                                <td class="px-4 py-3 font-bold" th:text="${row.codeId}">CODE</td>
                                <td class="px-4 py-3">
                                    <form method="post" action="/admin/system/code/group/update" class="grid grid-cols-1 md:grid-cols-5 gap-2 items-center">
                                        <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <input type="hidden" name="codeId" th:value="${row.codeId}" />
                                        <input class="gov-input" name="codeIdNm" th:value="${row.codeIdNm}" />
                                        <input class="gov-input" name="codeIdDc" th:value="${row.codeIdDc}" />
                                        <select class="gov-select" name="clCode">
                                            <option th:each="cl : ${clCodeList}"
                                                    th:value="${cl.clCode}"
                                                    th:selected="${cl.clCode == row.clCode}"
                                                    th:text="${cl.clCode + ' - ' + cl.clCodeNm}">분류</option>
                                        </select>
                                        <select class="gov-select" name="useAt">
                                            <option value="Y" th:selected="${row.useAt == 'Y'}">Y</option>
                                            <option value="N" th:selected="${row.useAt == 'N'}">N</option>
                                        </select>
                                        <div class="flex gap-2 justify-end md:col-span-1">
                                            <button class="gov-btn gov-btn-outline" type="submit">수정</button>
                                        </div>
                                    </form>
                                </td>
                                <td class="px-4 py-3 text-gray-500" th:text="${row.codeIdDc}">-</td>
                                <td class="px-4 py-3 text-gray-500" th:text="${row.clCodeNm}">-</td>
                                <td class="px-4 py-3 text-center" th:text="${row.useAt}">Y</td>
                                <td class="px-4 py-3 text-center">
                                    <form method="post" action="/admin/system/code/group/delete">
                                        <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <input type="hidden" name="codeId" th:value="${row.codeId}" />
                                        <button class="gov-btn gov-btn-danger" type="submit">삭제</button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(codeList)}">
                                <td class="px-4 py-6 text-center text-gray-500" colspan="6">코드 ID가 없습니다.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <section class="gov-card">
                <div class="flex items-center gap-2 border-b pb-4 mb-4">
                    <span class="material-symbols-outlined text-[var(--kr-gov-blue)]">fact_check</span>
                    <h3 class="text-lg font-bold">상세 코드</h3>
                </div>
                <form method="get" action="/admin/system/code" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                    <div class="md:col-span-2">
                        <label class="gov-label" for="detailCodeId">코드 ID 선택</label>
                        <select class="gov-select" id="detailCodeId" name="detailCodeId">
                            <option th:each="row : ${codeList}" th:value="${row.codeId}" th:selected="${row.codeId == detailCodeId}" th:text="${row.codeId + ' - ' + row.codeIdNm}">코드</option>
                        </select>
                    </div>
                    <div class="md:col-span-2 flex items-end">
                        <button class="gov-btn gov-btn-outline" type="submit">조회</button>
                    </div>
                </form>
                <form method="post" action="/admin/system/code/detail/create" class="grid grid-cols-1 md:grid-cols-6 gap-4 mb-4">
                    <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div>
                        <label class="gov-label" for="detailCodeIdInput">코드 ID</label>
                        <select class="gov-select" id="detailCodeIdInput" name="codeId">
                            <option th:each="row : ${codeList}" th:value="${row.codeId}" th:selected="${row.codeId == detailCodeId}" th:text="${row.codeId}">코드</option>
                        </select>
                    </div>
                    <div>
                        <label class="gov-label" for="detailCode">코드값</label>
                        <input class="gov-input" id="detailCode" name="code" placeholder="예: H001" type="text" />
                    </div>
                    <div class="md:col-span-2">
                        <label class="gov-label" for="detailCodeNm">코드명</label>
                        <input class="gov-input" id="detailCodeNm" name="codeNm" placeholder="메뉴명" type="text" />
                    </div>
                    <div>
                        <label class="gov-label" for="detailCodeDc">설명(영문)</label>
                        <input class="gov-input" id="detailCodeDc" name="codeDc" placeholder="영문명/설명" type="text" />
                    </div>
                    <div>
                        <label class="gov-label" for="detailUseAt">사용여부</label>
                        <select class="gov-select" id="detailUseAt" name="useAt">
                            <option value="Y">Y</option>
                            <option value="N">N</option>
                        </select>
                    </div>
                    <div class="md:col-span-6 flex justify-end gap-2">
                        <button class="gov-btn gov-btn-primary" type="submit">상세 코드 추가</button>
                    </div>
                </form>

                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left border-collapse">
                        <thead>
                            <tr class="gov-table-header">
                                <th class="px-4 py-3">코드 ID</th>
                                <th class="px-4 py-3">코드값</th>
                                <th class="px-4 py-3">코드명</th>
                                <th class="px-4 py-3">설명(영문)</th>
                                <th class="px-4 py-3 text-center">사용</th>
                                <th class="px-4 py-3 text-center">관리</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
                            <tr th:each="row : ${detailCodeList}">
                                <td class="px-4 py-3 font-bold" th:text="${row.codeId}">CODE</td>
                                <td class="px-4 py-3" th:text="${row.code}">VAL</td>
                                <td class="px-4 py-3">
                                    <form method="post" action="/admin/system/code/detail/update" class="grid grid-cols-1 md:grid-cols-4 gap-2 items-center">
                                        <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <input type="hidden" name="codeId" th:value="${row.codeId}" />
                                        <input type="hidden" name="code" th:value="${row.code}" />
                                        <input class="gov-input" name="codeNm" th:value="${row.codeNm}" />
                                        <input class="gov-input" name="codeDc" th:value="${row.codeDc}" />
                                        <select class="gov-select" name="useAt">
                                            <option value="Y" th:selected="${row.useAt == 'Y'}">Y</option>
                                            <option value="N" th:selected="${row.useAt == 'N'}">N</option>
                                        </select>
                                        <div class="flex gap-2 justify-end md:col-span-1">
                                            <button class="gov-btn gov-btn-outline" type="submit">수정</button>
                                        </div>
                                    </form>
                                </td>
                                <td class="px-4 py-3 text-gray-500" th:text="${row.codeDc}">-</td>
                                <td class="px-4 py-3 text-center" th:text="${row.useAt}">Y</td>
                                <td class="px-4 py-3 text-center">
                                    <form method="post" action="/admin/system/code/detail/delete">
                                        <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <input type="hidden" name="codeId" th:value="${row.codeId}" />
                                        <input type="hidden" name="code" th:value="${row.code}" />
                                        <button class="gov-btn gov-btn-danger" type="submit">삭제</button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(detailCodeList)}">
                                <td class="px-4 py-6 text-center text-gray-500" colspan="6">상세 코드가 없습니다.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div th:replace="~{egovframework/com/admin/footer :: footerFragment}"></div>

    <script th:inline="javascript">
        function logout() {
            if (confirm("로그아웃 하시겠습니까?")) {
                fetch('/admin/login/actionLogout', { method: 'POST' })
                    .then(response => response.json())
                    .then(response => {
                        if (response.status === 'success') {
                            location.href = '/admin/login/loginView';
                        }
                    });
            }
        }
    </script>
    <script src="/js/accessibility.js" defer></script>
</body>

</html>
