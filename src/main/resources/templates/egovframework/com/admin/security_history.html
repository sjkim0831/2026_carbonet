<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>접근 차단 이력 | CCUS 통합관리 시스템</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Public+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style type="text/tailwindcss">
        :root {
            --kr-gov-blue: #00378b;
            --kr-gov-blue-hover: #002d72;
            --kr-gov-green: #006b5d;
            --kr-gov-text-primary: #1a1a1a;
            --kr-gov-text-secondary: #4d4d4d;
            --kr-gov-border-light: #d9d9d9;
            --kr-gov-focus: #005fde;
            --kr-gov-radius: 5px;
        }
        @layer base {
            body { font-family: 'Noto Sans KR', 'Public Sans', sans-serif; -webkit-font-smoothing: antialiased; }
            .skip-link { @apply absolute -top-full left-0 bg-[var(--kr-gov-blue)] text-white p-3 z-[100] transition-all focus:top-0 focus:outline-none focus:ring-2 focus:ring-white; }
        }
        .material-symbols-outlined { font-variation-settings: 'wght' 400, 'opsz' 24; font-size: 24px; line-height: 1.6; }
        .gov-card { @apply border border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] bg-white p-6 shadow-sm; }
        .gov-table-header { @apply bg-gray-50 border-y border-[var(--kr-gov-border-light)] text-[14px] font-bold text-[var(--kr-gov-text-secondary)]; }
        .status-badge { @apply inline-flex items-center rounded-full px-2.5 py-1 text-xs font-bold; }
    </style>
</head>
<body class="bg-[#f8f9fa] text-[var(--kr-gov-text-primary)]">
<a class="skip-link" href="#main-content">본문 바로가기</a>
<div th:replace="~{egovframework/com/admin/header :: headerFragment}"></div>
<div class="flex min-h-[calc(100vh-124px)]">
    <aside class="js-admin-lnb w-72 bg-white border-r border-[var(--kr-gov-border-light)] p-5 flex flex-col" aria-label="관리자 사이드 메뉴"></aside>
    <main class="flex-1 p-8 overflow-y-auto" id="main-content">
        <nav aria-label="Breadcrumb" class="flex items-center gap-2 text-sm text-[var(--kr-gov-text-secondary)] mb-4">
            <span class="material-symbols-outlined text-[18px]">home</span>
            <span>시스템</span>
            <span class="material-symbols-outlined text-[16px]">chevron_right</span>
            <span class="font-bold text-[var(--kr-gov-blue)]">접근 차단 이력</span>
        </nav>
        <div class="flex items-end justify-between mb-6">
            <div>
                <h2 class="text-2xl font-black">접근 차단 이력</h2>
                <p class="text-sm text-[var(--kr-gov-text-secondary)] mt-1">계정 잠금, IP 거부 등 접근 차단으로 기록된 이력만 조회합니다.</p>
            </div>
            <div class="text-sm">전체 <span class="font-bold text-[var(--kr-gov-blue)]" th:text="${#numbers.formatInteger(totalCount, 0, 'COMMA')}">0</span>건</div>
        </div>
        <div class="mb-4 rounded-[var(--kr-gov-radius)] border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"
             th:if="${loginHistoryError}" th:text="${loginHistoryError}"></div>
        <section class="gov-card mb-6">
            <form action="/admin/system/security" class="grid grid-cols-1 md:grid-cols-3 gap-4" method="get">
                <div>
                    <label class="block text-[14px] font-bold text-[var(--kr-gov-text-secondary)] mb-2" for="userSe">사용자 구분</label>
                    <select class="w-full rounded-[var(--kr-gov-radius)] border-[var(--kr-gov-border-light)] text-sm focus:ring-[var(--kr-gov-focus)] focus:border-[var(--kr-gov-focus)]" id="userSe" name="userSe">
                        <option value="" th:selected="${userSe == null or userSe == ''}">전체</option>
                        <option value="USR" th:selected="${userSe == 'USR'}">관리자</option>
                        <option value="ENT" th:selected="${userSe == 'ENT'}">기업회원</option>
                        <option value="GNR" th:selected="${userSe == 'GNR'}">일반회원</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-[14px] font-bold text-[var(--kr-gov-text-secondary)] mb-2" for="searchKeyword">검색어</label>
                    <div class="flex gap-2">
                        <input class="flex-1 rounded-[var(--kr-gov-radius)] border-[var(--kr-gov-border-light)] text-sm focus:ring-[var(--kr-gov-focus)] focus:border-[var(--kr-gov-focus)]" id="searchKeyword" name="searchKeyword" placeholder="아이디, 이름, IP, 차단 사유 검색" th:value="${searchKeyword}" type="text" />
                        <button class="inline-flex items-center gap-2 rounded-[var(--kr-gov-radius)] bg-[var(--kr-gov-blue)] px-5 py-2 text-sm font-bold text-white hover:bg-[var(--kr-gov-blue-hover)]" type="submit">
                            <span class="material-symbols-outlined text-[18px]">search</span>
                            검색
                        </button>
                    </div>
                </div>
            </form>
        </section>
        <section class="gov-card p-0 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left border-collapse">
                    <thead>
                    <tr class="gov-table-header">
                        <th class="px-6 py-4 text-center w-16">번호</th>
                        <th class="px-6 py-4">차단 일시</th>
                        <th class="px-6 py-4">사용자 구분</th>
                        <th class="px-6 py-4">이름 (아이디)</th>
                        <th class="px-6 py-4">IP</th>
                        <th class="px-6 py-4">차단 사유</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                    <tr class="hover:bg-gray-50/50 transition-colors" th:each="item, stat : ${loginHistoryList}">
                        <td class="px-6 py-4 text-center text-gray-500" th:text="${totalCount - ((pageIndex - 1) * pageSize + stat.index)}">1</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${item.loginPnttm}">2026-03-12 09:00:00</td>
                        <td class="px-6 py-4">
                            <span th:if="${item.userSe == 'USR'}">관리자</span>
                            <span th:if="${item.userSe == 'ENT'}">기업회원</span>
                            <span th:if="${item.userSe == 'GNR'}">일반회원</span>
                            <span th:if="${item.userSe != 'USR' and item.userSe != 'ENT' and item.userSe != 'GNR'}" th:text="${item.userSe}">기타</span>
                        </td>
                        <td class="px-6 py-4">
                            <div class="font-semibold" th:text="${#strings.isEmpty(item.userNm) ? '-' : item.userNm}">홍길동</div>
                            <div class="text-xs text-gray-400" th:text="${item.userId}">user01</div>
                        </td>
                        <td class="px-6 py-4 text-gray-600" th:text="${item.loginIp}">127.0.0.1</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${#strings.isEmpty(item.loginMessage) ? '-' : item.loginMessage}">계정 잠금</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(loginHistoryList)}">
                        <td class="px-6 py-8 text-center text-gray-500" colspan="6">조회된 접근 차단 이력이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
<div th:replace="~{egovframework/com/admin/footer :: footerFragment}"></div>
</body>
</html>
