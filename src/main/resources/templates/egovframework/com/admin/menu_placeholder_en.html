<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title th:text="${placeholderTitleEn} + ' | CCUS Integrated Management System'">Menu Screen | CCUS Integrated Management System</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Public+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style type="text/tailwindcss">
        :root { --kr-gov-blue:#00378b; --kr-gov-border-light:#d9d9d9; --kr-gov-radius:5px; --kr-gov-text-primary:#1a1a1a; --kr-gov-text-secondary:#4d4d4d; }
        @layer base { body { font-family:'Noto Sans KR','Public Sans',sans-serif; -webkit-font-smoothing:antialiased; } .skip-link { @apply absolute -top-full left-0 bg-[var(--kr-gov-blue)] text-white p-3 z-[100] transition-all focus:top-0; } }
        .gov-card { @apply border border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] bg-white p-6 shadow-sm; }
        .material-symbols-outlined { font-size:24px; line-height:1.6; }
    </style>
</head>
<body class="bg-[#f8f9fa] text-[var(--kr-gov-text-primary)]">
<a class="skip-link" href="#main-content">Skip to content</a>
<div th:replace="~{egovframework/com/admin/header :: headerFragment}"></div>
<div class="flex min-h-[calc(100vh-124px)]">
    <aside aria-label="Admin side menu" class="js-admin-lnb w-72 bg-white border-r border-[var(--kr-gov-border-light)] p-5 flex flex-col"></aside>
    <main class="flex-1 p-8 overflow-y-auto" id="main-content">
        <div class="gov-card max-w-5xl">
            <div class="flex items-start gap-4">
                <span class="material-symbols-outlined text-[42px] text-[var(--kr-gov-blue)]" th:text="${placeholderIcon}">web</span>
                <div>
                    <h2 class="text-3xl font-black mb-2" th:text="${placeholderTitleEn}">Menu Screen</h2>
                    <p class="text-sm text-[var(--kr-gov-text-secondary)]">This menu already exists in the database and is now connected to a common placeholder screen until the detailed business page is implemented.</p>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8">
                <div class="rounded-[var(--kr-gov-radius)] border border-[var(--kr-gov-border-light)] p-4">
                    <p class="text-xs font-bold text-[var(--kr-gov-text-secondary)] mb-2">Menu Code</p>
                    <p class="font-bold" th:text="${placeholderCode}">A0000000</p>
                </div>
                <div class="rounded-[var(--kr-gov-radius)] border border-[var(--kr-gov-border-light)] p-4">
                    <p class="text-xs font-bold text-[var(--kr-gov-text-secondary)] mb-2">Mapped URL</p>
                    <p class="font-bold break-all" th:text="${placeholderUrl}">/admin/sample</p>
                </div>
            </div>
        </div>
    </main>
</div>
<div th:replace="~{egovframework/com/admin/footer :: footerFragment}"></div>
</body>
</html>
