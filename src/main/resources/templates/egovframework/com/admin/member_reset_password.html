<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>비밀번호 초기화 이력 | CCUS 통합관리 시스템</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Public+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style type="text/tailwindcss">
        :root {
            --kr-gov-blue: #00378b;
            --kr-gov-blue-hover: #002d72;
            --kr-gov-text-primary: #1a1a1a;
            --kr-gov-text-secondary: #4d4d4d;
            --kr-gov-border-light: #d9d9d9;
            --kr-gov-focus: #005fde;
            --kr-gov-radius: 5px;
        }
        @layer base {
            body { font-family: 'Noto Sans KR', 'Public Sans', sans-serif; -webkit-font-smoothing: antialiased; }
            .skip-link {
                @apply absolute -top-full left-0 bg-[var(--kr-gov-blue)] text-white p-3 z-[100] transition-all focus:top-0 focus:outline-none focus:ring-2 focus:ring-white;
            }
        }
        .material-symbols-outlined { font-variation-settings: 'wght' 400, 'opsz' 24; font-size: 24px; line-height: 1.6; }
        .gov-card { @apply border border-[var(--kr-gov-border-light)] rounded-[var(--kr-gov-radius)] bg-white p-6 shadow-sm; }
        .gov-table-header { @apply bg-gray-50 border-y border-[var(--kr-gov-border-light)] text-[14px] font-bold text-[var(--kr-gov-text-secondary)]; }
        .breadcrumb-item { @apply flex items-center gap-1 text-[13px] text-gray-500; }
        .breadcrumb-item:last-child { @apply text-[var(--kr-gov-blue)] font-bold; }
    </style>
</head>
<body class="bg-[#f8f9fa] text-[var(--kr-gov-text-primary)]">
<a class="skip-link" href="#main-content">본문 바로가기</a>
<div th:replace="~{egovframework/com/admin/header :: headerFragment}"></div>
<div class="flex min-h-[calc(100vh-124px)]">
    <aside class="js-admin-lnb w-72 bg-white border-r border-[var(--kr-gov-border-light)] p-5 flex flex-col" aria-label="관리자 사이드 메뉴"></aside>
    <main class="flex-1 p-8 overflow-y-auto" id="main-content">
        <nav aria-label="Breadcrumb" class="flex items-center gap-2 mb-4">
            <div class="breadcrumb-item"><span class="material-symbols-outlined text-[16px]">home</span> 홈</div>
            <span class="text-gray-300 text-[12px] material-symbols-outlined">chevron_right</span>
            <div class="breadcrumb-item">회원·권한 관리</div>
            <span class="text-gray-300 text-[12px] material-symbols-outlined">chevron_right</span>
            <div class="breadcrumb-item">비밀번호 초기화 이력</div>
        </nav>

        <div class="flex items-end justify-between mb-6">
            <div>
                <h2 class="text-2xl font-black">비밀번호 초기화 이력</h2>
                <p class="mt-1 text-sm text-[var(--kr-gov-text-secondary)]">관리자 비밀번호 초기화 실행 이력을 조회합니다.</p>
            </div>
            <div class="text-sm">전체 <span class="font-bold text-[var(--kr-gov-blue)]" th:text="${#numbers.formatInteger(totalCount, 0, 'COMMA')}">0</span>건</div>
        </div>

        <div class="mb-4 rounded-[var(--kr-gov-radius)] border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"
             th:if="${member_resetPasswordError}" th:text="${member_resetPasswordError}"></div>

        <section class="gov-card mb-6">
            <form action="/admin/react-migration" class="grid grid-cols-1 md:grid-cols-4 gap-4" method="get">
                <input type="hidden" name="route" value="password-reset" />
                <div>
                    <label class="block text-[14px] font-bold text-[var(--kr-gov-text-secondary)] mb-2" for="resetSource">유형</label>
                    <select class="w-full rounded-[var(--kr-gov-radius)] border-[var(--kr-gov-border-light)] text-sm focus:ring-[var(--kr-gov-focus)] focus:border-[var(--kr-gov-focus)]" id="resetSource" name="resetSource">
                        <option value="" th:selected="${resetSource == null or resetSource == ''}">전체</option>
                        <option value="ADMIN_MEMBER_RESET" th:selected="${resetSource == 'ADMIN_MEMBER_RESET'}">관리자 초기화</option>
                        <option value="SELF_SERVICE" th:selected="${resetSource == 'SELF_SERVICE'}">사용자 직접 변경</option>
                    </select>
                </div>
                <div class="md:col-span-3">
                    <label class="block text-[14px] font-bold text-[var(--kr-gov-text-secondary)] mb-2" for="searchKeyword">검색어</label>
                    <div class="flex gap-2">
                        <input class="flex-1 rounded-[var(--kr-gov-radius)] border-[var(--kr-gov-border-light)] text-sm focus:ring-[var(--kr-gov-focus)] focus:border-[var(--kr-gov-focus)]" id="searchKeyword" name="searchKeyword" placeholder="회원 ID, 수행자 ID, IP 검색" th:value="${searchKeyword}" type="text" />
                        <button class="inline-flex items-center gap-2 rounded-[var(--kr-gov-radius)] bg-[var(--kr-gov-blue)] px-5 py-2 text-sm font-bold text-white hover:bg-[var(--kr-gov-blue-hover)]" type="submit">
                            <span class="material-symbols-outlined text-[18px]">search</span>
                            검색
                        </button>
                    </div>
                </div>
            </form>
        </section>

        <section class="gov-card p-0 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left border-collapse">
                    <thead>
                    <tr class="gov-table-header">
                        <th class="px-6 py-4 text-center w-16">번호</th>
                        <th class="px-6 py-4">초기화 일시</th>
                        <th class="px-6 py-4">회원 ID</th>
                        <th class="px-6 py-4">회원 구분</th>
                        <th class="px-6 py-4">수행자</th>
                        <th class="px-6 py-4">IP</th>
                        <th class="px-6 py-4">유형</th>
                        <th class="px-6 py-4 text-center">상세</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                    <tr class="hover:bg-gray-50/50 transition-colors" th:each="item, stat : ${passwordResetHistoryList}">
                        <td class="px-6 py-4 text-center text-gray-500" th:text="${totalCount - ((pageIndex - 1) * pageSize + stat.index)}">1</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${item.resetAt}">2026.03.12 10:22:33</td>
                        <td class="px-6 py-4 font-semibold" th:text="${item.targetUserId}">user01</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${item.targetUserSeLabel}">기업회원</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${item.resetBy}">admin</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${item.resetIp}">127.0.0.1</td>
                        <td class="px-6 py-4 text-gray-600" th:text="${item.resetSource}">ADMIN_MEMBER_RESET</td>
                        <td class="px-6 py-4 text-center">
                            <a class="inline-flex items-center justify-center rounded border border-[var(--kr-gov-border-light)] px-3 py-1.5 text-xs font-bold hover:bg-gray-50"
                               th:href="${item.detailUrl}">회원 보기</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(passwordResetHistoryList)}">
                        <td class="px-6 py-8 text-center text-gray-500" colspan="8">조회된 비밀번호 초기화 이력이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div class="px-6 py-4 border-t border-[var(--kr-gov-border-light)] bg-gray-50 flex justify-center">
                <nav class="flex items-center gap-1">
                    <a class="p-1 rounded hover:bg-white border border-transparent hover:border-gray-200"
                       th:href="@{/admin/react-migration(route='password-reset',pageIndex=1,searchKeyword=${searchKeyword},resetSource=${resetSource})}">
                        <span class="material-symbols-outlined">first_page</span>
                    </a>
                    <a class="p-1 rounded hover:bg-white border border-transparent hover:border-gray-200"
                       th:href="@{/admin/react-migration(route='password-reset',pageIndex=${prevPage},searchKeyword=${searchKeyword},resetSource=${resetSource})}">
                        <span class="material-symbols-outlined">chevron_left</span>
                    </a>
                    <div class="flex items-center gap-1 mx-4">
                        <a th:each="pageNum : ${#numbers.sequence(startPage, endPage)}"
                           th:href="@{/admin/react-migration(route='password-reset',pageIndex=${pageNum},searchKeyword=${searchKeyword},resetSource=${resetSource})}"
                           th:text="${pageNum}"
                           th:classappend="${pageNum == pageIndex} ? 'bg-[var(--kr-gov-blue)] text-white font-bold' : 'hover:bg-white hover:border-gray-200'"
                           class="w-8 h-8 rounded border border-transparent text-sm flex items-center justify-center">1</a>
                    </div>
                    <a class="p-1 rounded hover:bg-white border border-transparent hover:border-gray-200"
                       th:href="@{/admin/react-migration(route='password-reset',pageIndex=${nextPage},searchKeyword=${searchKeyword},resetSource=${resetSource})}">
                        <span class="material-symbols-outlined">chevron_right</span>
                    </a>
                    <a class="p-1 rounded hover:bg-white border border-transparent hover:border-gray-200"
                       th:href="@{/admin/react-migration(route='password-reset',pageIndex=${totalPages},searchKeyword=${searchKeyword},resetSource=${resetSource})}">
                        <span class="material-symbols-outlined">last_page</span>
                    </a>
                </nav>
            </div>
        </section>
    </main>
</div>
<div th:replace="~{egovframework/com/admin/footer :: footerFragment}"></div>
</body>
</html>
