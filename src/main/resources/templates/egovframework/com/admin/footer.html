<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<footer th:fragment="footerFragment"
    th:with="isEn=${#strings.startsWith(#httpServletRequest.requestURI, '/en/admin') or (#httpServletRequest.getParameter('language') != null and #httpServletRequest.getParameter('language').equalsIgnoreCase('en'))}"
    class="bg-white border-t border-[var(--kr-gov-border-light)] z-40 relative">
    <div class="max-w-full mx-auto px-6 py-6 flex flex-col md:flex-row justify-between items-center gap-6">
        <div class="flex items-center gap-4">
            <img th:attr="alt=${isEn} ? 'Government Symbol of the Republic of Korea' : '대한민국정부 상징'" alt="대한민국정부 상징" class="h-8 grayscale opacity-70"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuBUw404pm2QFmL61j73Dpfn72GnHGEg-KXTkLQ8WVJYUJ4iekrO0IvqJK8cd0cOSNSIh9Yq1LAodkSNj7oHtVAltdnnymj25ZzOI3l167qrrWmkEoYsZGu3ztT-YGo9se-fFR3NhBG3rZ8DYfs2vna0bxSzVG8VjryTnsz40LCDS2SN3-AeqXrbaPEva2ptmrQzO8iQSwbqSGyGKddlGf7FtnhHT25Cz5a5Xhk8MTve0BF4RWxN-ULiw64ZBbrTASIHQUaURqiZXyE" />
            <div class="text-[12px] text-[var(--kr-gov-text-secondary)] leading-tight border-l border-gray-200 pl-4">
                <p id="admin-footer-title" class="font-bold text-[13px] mb-0.5"
                    th:text="${isEn} ? 'Net Zero CCUS Integrated Management HQ (Admin Console)' : '탄소중립 CCUS 통합관리본부 (Admin Console)'">탄소중립 CCUS 통합관리본부 (Admin Console)</p>
                <p>© 2025 CCUS Integration Management Portal. All rights reserved.</p>
            </div>
        </div>
        <div class="flex items-center gap-4 text-[12px] font-medium text-[var(--kr-gov-text-secondary)]">
            <a id="admin-footer-terms" class="hover:underline" href="#"
                th:text="${isEn} ? 'Terms of Service' : '서비스 이용약관'">서비스 이용약관</a>
            <span class="text-gray-300">|</span>
            <a id="admin-footer-privacy" class="hover:underline" href="#"
                th:text="${isEn} ? 'Privacy Policy' : '개인정보처리방침'">개인정보처리방침</a>
            <span class="text-gray-300">|</span>
            <a class="hover:underline" th:href="${isEn} ? '/en/admin/content/sitemap' : '/admin/content/sitemap'"
                th:text="${isEn} ? 'Sitemap' : '사이트맵'">사이트맵</a>
            <span class="text-gray-300">|</span>
            <div
                class="bg-[var(--kr-gov-bg-gray)] px-3 py-1 rounded-[5px] text-[11px] font-bold border border-gray-200">
                <span id="admin-footer-updated" th:text="${isEn} ? 'Last Updated: 2025.08.14 14:45' : '최종 업데이트: 2025.08.14 14:45'">Last Updated: 2025.08.14 14:45</span>
            </div>
        </div>
    </div>
</footer>

</html>
