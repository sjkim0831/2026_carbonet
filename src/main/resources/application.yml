server:
  port: 18000
  forward-headers-strategy: native
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    key-store: ${SERVER_SSL_KEY_STORE:}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:}
    key-store-type: ${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
    key-alias: ${SERVER_SSL_KEY_ALIAS:}
  servlet:
    session:
      cookie:
        secure: ${SERVER_SSL_ENABLED:false}

egov:
  page:
    size: 10
    unit: 10
  login:
    lock: true
    lockCount: 5

spring:
  application:
    name: carbonet
  main:
    allow-bean-definition-overriding: true
  profiles:
    active: local
  datasource:
    driver-class-name: cubrid.jdbc.driver.CUBRIDDriver
    url: jdbc:cubrid:${CUBRID_HOST:127.0.0.1}:33000:carbonet:::?charset=UTF-8
    username: dba
    password: ""
    hikari:
      maximum-pool-size: 20
      connection-timeout: 30000
      initialization-fail-timeout: -1
  jpa:
    database-platform: org.hibernate.dialect.CUBRIDDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show_sql: false
        format_sql: false
    open-in-view: false
    show-sql: false
  messages:
    encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  thymeleaf:
    encoding: UTF-8
    mode: HTML
    cache: false
  devtools:
    livereload:
      enabled: false
    restart:
      enabled: true
      additional-exclude:
        - static/react-app/**
        - static/react-app/.vite/**
        - static/react-app/assets/**
      additional-paths:
        - src/main/resources/templates
        - src/main/resources/static

logging:
  file:
    name: /tmp/carbonet-runtime-18000.log
  level:
    org:
      egovframe:
        rte: info
      springframework:
        web: info
      hibernate:
        SQL: off
        type:
          descriptor:
            sql: off
    egovframework:
      com: info

Globals:
  auth: security

token:
  accessSecret: ${TOKEN_ACCESS_SECRET}
  refreshSecret: ${TOKEN_REFRESH_SECRET}
  accessExpiration: 3600000
  refreshExpiration: 3600000

security:
  gateway:
    enabled: ${SECURITY_GATEWAY_ENABLED:false}
    code-id: ${SECURITY_GATEWAY_CODE_ID:}
  codex:
    enabled: ${SECURITY_CODEX_ENABLED:false}
    api-key: ${SECURITY_CODEX_API_KEY:}
    history-file: ${SECURITY_CODEX_HISTORY_FILE:/tmp/carbonet-codex-history.jsonl}
    runner:
      enabled: ${SECURITY_CODEX_RUNNER_ENABLED:false}
      repo-root: ${SECURITY_CODEX_RUNNER_REPO_ROOT:}
      workspace-root: ${SECURITY_CODEX_RUNNER_WORKSPACE_ROOT:/tmp/carbonet-sr-codex-runner}
      history-file: ${SECURITY_CODEX_RUNNER_HISTORY_FILE:/tmp/carbonet-sr-codex-runner-history.jsonl}
      allowed-path-prefixes: ${SECURITY_CODEX_RUNNER_ALLOWED_PATH_PREFIXES:src/main/java,src/main/resources,frontend/src,docs/ai,ops/scripts}
      codex-command: ${SECURITY_CODEX_RUNNER_CODEX_COMMAND:}
      plan-command: ${SECURITY_CODEX_RUNNER_PLAN_COMMAND:}
      build-command: ${SECURITY_CODEX_RUNNER_BUILD_COMMAND:}
      backend-verify-command: ${SECURITY_CODEX_RUNNER_BACKEND_VERIFY_COMMAND:mvn -q -DskipTests package}
      frontend-verify-command: ${SECURITY_CODEX_RUNNER_FRONTEND_VERIFY_COMMAND:bash {repoRoot}/ops/scripts/codex-frontend-verify.sh {repoRoot} {diffFile}}
      frontend-verify-workdir: ${SECURITY_CODEX_RUNNER_FRONTEND_VERIFY_WORKDIR:frontend}
      deploy-command: ${SECURITY_CODEX_RUNNER_DEPLOY_COMMAND:bash {repoRoot}/ops/scripts/codex-apply-and-deploy.sh {repoRoot} {diffFile}}
      health-check-url: ${SECURITY_CODEX_RUNNER_HEALTH_CHECK_URL:${CARBONET_HEALTH_CHECK_URL:http://127.0.0.1:18000/actuator/health}}
      health-check-timeout-seconds: ${SECURITY_CODEX_RUNNER_HEALTH_CHECK_TIMEOUT_SECONDS:60}
      health-check-interval-seconds: ${SECURITY_CODEX_RUNNER_HEALTH_CHECK_INTERVAL_SECONDS:5}
      rollback-command: ${SECURITY_CODEX_RUNNER_ROLLBACK_COMMAND:}
      command-timeout-seconds: ${SECURITY_CODEX_RUNNER_COMMAND_TIMEOUT_SECONDS:1800}
      verify-timeout-seconds: ${SECURITY_CODEX_RUNNER_VERIFY_TIMEOUT_SECONDS:1800}
      require-approval-token: ${SECURITY_CODEX_RUNNER_REQUIRE_APPROVAL_TOKEN:false}
  request-log:
    enabled: ${SECURITY_REQUEST_LOG_ENABLED:true}
    file: ${SECURITY_REQUEST_LOG_FILE:/tmp/carbonet-request-execution-history.jsonl}

observability:
  trace:
    enabled: ${OBSERVABILITY_TRACE_ENABLED:true}
    response-headers-enabled: ${OBSERVABILITY_TRACE_RESPONSE_HEADERS_ENABLED:true}
  audit:
    enabled: ${OBSERVABILITY_AUDIT_ENABLED:true}
    log-writer-enabled: ${OBSERVABILITY_AUDIT_LOG_WRITER_ENABLED:true}
  ui:
    manifest-enabled: ${OBSERVABILITY_UI_MANIFEST_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,mappings

org:
  egovframe:
    crypto:
      algorithm: SHA-256
      algorithmKey: egovframe
      algorithmKeyHash: gdyYs/IZqY86VcWhT8emCYfqY1ahw2vtLG+/FzNqtrQ=

    security:
      loginUrl: /signin/loginView
      logoutSuccessUrl: /signin/loginView
      loginFailureUrl: /signin/loginFailure
      accessDeniedUrl: /signin/accessDenied
      csrfAccessDeniedUrl: /signin/csrfAccessDenied
      defaultTargetUrl: /main
      dataSource: dataSource
      excludeList: /css/**,/images/**,/js/**,/uat/**,/home/**,/signin/**,/join/**,/admin/login/**,/actuator/**,/api/telemetry/**,/api/frontend/error/report
      csrf: true
      xframeOptions: sameorigin
      sniff: false
      xssProtection: true
      cacheControl: false
      concurrentMaxSessons: 1
      errorIfMaximumExceeded: false
      concurrentExpiredUrl: /signin/loginView
      hash: plaintext
      hashBase64: false
      requestMatcherType: ant
      jdbcMapClass: org.egovframe.boot.security.userdetails.DefaultMapUserDetailsMapping
      jdbcUsersByUsernameQuery: >
        SELECT USER_ID, PASSWORD, 'TRUE' AS ENABLED
        FROM COMVNUSERMASTER
        WHERE USER_ID = ?
      jdbcAuthoritiesByUsernameQuery: >
        SELECT A.SCRTY_DTRMN_TRGET_ID USER_ID, A.AUTHOR_CODE AUTHORITY
        FROM MSATNEMPLYRSCRTYESTBS A, COMVNUSERMASTER B WHERE
        A.SCRTY_DTRMN_TRGET_ID = B.ESNTL_ID AND B.USER_ID = ?
      sqlRolesAndUrl: >
        SELECT A.ROLE_PTTRN URL, B.AUTHOR_CODE AUTHORITY
        FROM MSATNROLEINFO A, MSATNAUTHORROLERELATE B
        WHERE A.ROLE_CODE = B.ROLE_CODE  AND A.ROLE_TY = 'url'
        ORDER BY A.ROLE_SORT
      sqlHierarchicalRoles: >
        SELECT CHLDRN_ROLE AS CHILD, PARNTS_ROLE PARENT FROM MSATNROLES_HIERARCHY
      roleHierarchyString: |
        IS_AUTHENTICATED_ANONYMOUSLY > ROLE_ANONYMOUS
        IS_AUTHENTICATED_REMEMBERED > IS_AUTHENTICATED_ANONYMOUSLY
        IS_AUTHENTICATED_FULLY > IS_AUTHENTICATED_REMEMBERED
        ROLE_USER > IS_AUTHENTICATED_FULLY
        ROLE_ADMIN > ROLE_USER
